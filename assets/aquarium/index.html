<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Aquarium Widget Demo</title>

<!-- the game's own stylesheet -->
<link rel="stylesheet" href="css/aquarium.css?4">


<style>

  /* >>> the game container: full width, about a quarter of the screen <<< */
  #tank {
    width: 100%;
    height: 30vh;
    min-height: 168px;
    border-radius: 16px;
  }

  /* control buttons that call the exported API */
  .controls {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    margin-top: 12px;
  }
  .controls button {
    font-family: inherit;
    font-weight: 700;
    font-size: 12px;
    color: var(--ink);
    border: none;
    border-radius: 15px;
    padding: 11px 4px 9px;
    background: var(--foam);
    box-shadow: 0 3px 0 #cfe6ee;
    cursor: pointer;
    transition: transform .08s ease, box-shadow .08s ease;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .controls button .ico { font-size: 21px; line-height: 1; }
  .controls button:active { transform: translateY(3px); box-shadow: 0 0 0 #cfe6ee; }
  .controls button.primary { background: linear-gradient(150deg,#fff0d6,#ffd9bd); box-shadow: 0 3px 0 #f0c49c; }

  /* a toast for grant feedback */
  .toast {
    position: fixed; 
    left: 50%; 
    bottom: 26px;
    transform: translate(-50%, 24px);
    background: #000; 
    color: #fff;
    font-size: 13.5px;
    padding: 11px 20px; 
    border-radius: 999px;
    box-shadow: 0 10px 24px rgba(13,59,78,.35);
    opacity: 0; 
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

</style>
</head>
<body>

<div class="phone">

  <h1>Aquarium demo</h1>

  <!-- ===== the aquarium widget, embedded like any other component ===== -->
  <div class="tank-card">
    <div id="tank"></div>
    <div class="controls">
      <button id="btn-fish" class="primary"><span class="ico">&#x1F41F;</span>Add Fish</button>
      <button id="btn-item" class="primary"><span class="ico">&#x1F3F0;</span>Add Item</button>
      <button id="btn-feed"><span class="ico">&#x1F990;</span>Feed</button>
      <button id="btn-reset"><span class="ico">&#x21BA;</span>Reset</button>
    </div>
  </div>
  <!-- ================================================================= -->


</div>

<div id="toast" class="toast"></div>

<!-- the game: catalogue first, then the engine. No build step, no server. -->
<script src="js/config.js?7"></script>
<script src="js/aquarium.js?7"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {

    /* Launch the game inside the supplied DIV. */
    var game = new Aquarium(document.getElementById('tank'));

    /* --- tiny toast helper --- */
    var toast = document.getElementById('toast'), toastTimer;
    function say(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 1900);
    }
    function nice(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    /* --- wire the buttons to the exported API --- */
    document.getElementById('btn-fish').addEventListener('click', function () {
      say('New friend: ' + nice(game.grantFish()) + '!');
    });
    document.getElementById('btn-item').addEventListener('click', function () {
      say('You received a ' + nice(game.grantItem()) + '!');
    });
    document.getElementById('btn-feed').addEventListener('click', function () {
      game.feed(8);
      say('Yum! Food dropped in.');
    });
    document.getElementById('btn-reset').addEventListener('click', function () {
      game.reset();
      say('Aquarium reset.');
    });
  });
</script>

</body>
</html>
