        // Initialize a question
        function start_question14(problem) {
            bee.problem = problem; // {word_ix:, word_class:, is_repeat:}
            if(bee.help_timeout !== false) { clearTimeout(bee.help_timeout); bee.help_timeout = false; }

            bee.processed_word = bee.words[bee.problem.word_ix].proc_cache;

            // Show picture
            bee.$image.html(word_image_html(bee.processed_word));
            
            // Add help & input
            bee.typed = '';
            bee.help_asked = 0;
            bee.backspace_used = 0;
            bee.help_full_bar = false;
            bee.seg_class = [];    // per-segment classification (focus/obvious/revealed), set below
            bee.seg_locked = [];   // per-segment: can no longer score (already scored, or a backspace disqualified it)

            // Per-pair coverage stats: classify each segment once, when first shown, and count the
            // "ask" (the odd counters). Repeats must not move the stats.
            if(bee.processed_word.is_segmented && !bee.problem.is_repeat) {
                const denom_ix = {'focus':1, 'obvious':3, 'revealed':5};
                for(let i=0; i<bee.processed_word.add_words.length; i++) {
                    const c = classify_segment(i);
                    bee.seg_class[i] = c.kind;
                    pair_stat(c.pair)[denom_ix[c.kind]]++;
                }
            }

            if(!bee.processed_word.is_story && !bee.processed_word.is_segmented) {
                bee.$help.html(render_to_html(true));
                $('.prompt .addwords').hide();
                $('.kbdiv .kbhelp').css({'visibility': 'visible'});
            } else {
                // Story or segmented: show the shuffled word bank to copy from. render_addwords()
                // builds the right variant (story = all words; segmented = tiles minus predictable
                // pairs with a '?' card for the in-focus pair; HELP then reveals every segment plain).
                // Hide it only when it comes back empty (e.g. an all-predictable segmented word).
                // Stories hide both help keys. Segmented keeps 💬 and shows ? (switch bank to full mode).
                const bank = render_addwords();
                if(bank) { $('.prompt .addwords').html(bank).show(); } else { $('.prompt .addwords').hide(); }
                $('.kbdiv .kbkey[data-key="HELP"]').css({'visibility': bee.processed_word.is_segmented ? 'visible' : 'hidden'});
                $('.kbdiv .kbkey[data-key="PLAY_WORD"]').css({'visibility': bee.processed_word.is_segmented ? 'visible' : 'hidden'});
            }
            bee.$input.html('');
            $('.prompt .infield').toggleClass('infield_story', !!bee.processed_word.is_story);
            $('.prompt .infield').toggleClass('infield_segmented', !!bee.processed_word.is_segmented);
            bee.$input.removeClass('success');
            
            enable_typing();
            bee.can_use_help = true;
            call_local_hook('start_question_hook', []);
            show_help(true);
        }
        
        
        // Returns whether to use this item (true) or choose another one (false)
        // based on the user's success history
        function known_score_to_choice20(score) {
            let limit = 0;
            if(score < 2) { return true; }
            if(score == 2) { limit = .8; }
            else if(score == 3) { limit = .9; }
            else if(score == 4) { limit = .95; }
            else { limit = .99; }
            return (Math.random() > limit);
        }
        
        

        function try_get_new_word10(word_class) {
            let trials = 50;

            let word_ix = undefined;
            let last_ok_ix = undefined; // last candidate that cleared the duplicate check
            let log = 'needclass:'+word_class;
            const queue = get_question_queue();            
            
            while(trials > 0) {
                log += ' trials:'+trials;
                trials--;
                
                if(word_class !== undefined) { // We have a desired word class (subsequent words)
                    const ixs = bee.class_to_ix[word_class];
                    if(ixs === undefined) { log += ' class_not_found'; break; }
                    if(ixs.length == 0) { log += ' class_empty'; break; }
                    // Choose using levels
                    word_ix = choose_using_levels20(ixs);
                    log += ' wix:'+word_ix+" lev:"+bee.words[word_ix].level;
                    // ensure we choose a new word (check the queue)
                    let dupl = false;
                    for(let i=0; i<queue.length; i++) {
                        if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                    }
                    if(dupl && trials > 0) { log += ' norep'; continue; } // retry for a non-duplicate while we can
                    if(!dupl) { last_ok_ix = word_ix; } // remember the last genuine non-duplicate (may still be 'known')
                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice20(known_count)) { log += ' no'; continue; }
                    break;
                }

                if(word_class === undefined) { // first word
                    // Choose using levels
                    word_ix = choose_using_levels20(undefined); // undefined: from all words
                    log += " wix:"+word_ix+" lev:"+bee.words[word_ix].level;
                    // ensure we choose a new word (check the queue)
                    if(bee.words.length > 1 && trials > 0) {
                        let dupl = false;
                        for(let i=0; i<queue.length; i++) {
                            if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                        }
                        if(dupl) { log += ' norep'; continue; }
                    }

                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice20(known_count)) { log += ' no'; continue; }
                    break;
                }

            }
            console.log('try_get_new_word: '+log);
            if(trials == 0) { return last_ok_ix; } // known / last-resort word on exhaustion, not undefined
            return word_ix;
        }
        
        
        // Pick an example word to introduce a class group's grapheme: prefer a word OTHER than
        // exclude_ix (so the intro doesn't reveal the pending word), else fall back to exclude_ix.
        function intro_word_for_class(word_class, exclude_ix) {
            const word_ixs = bee.class_to_ix[word_class];
            if(word_ixs !== undefined && word_ixs.length > 0) {
                const choices = word_ixs.filter(function(ix) { return ix != exclude_ix; });
                if(choices.length > 0) { return choose_from(choices); }
            }
            return exclude_ix;
        }


        function new_question(reason) {  // also called from common.js on successfully answering a question
            console.log('#new_question05() caller=', reason);
            if(check_dismiss_puzzle()) { return; } // puzzle solved: don't generate/speak the next question
            // No words match the selected level range: warn instead of crashing while picking a word
            if(bee.words.length == 0) {
                bee_alert('No words found for the selected level range. Please choose a different range with "Update word sets".');
                return;
            }
            page_update();
            
            try{ document.activeElement.blur(); }catch(e){}
            
            let problem = get_first_on_queue();
            let log = '';
            let intro_word_ix = undefined; // group intro's example word; undefined = no intro (queue-restored)

            // Once per page-load: re-introduce the group even when resuming the persisted (anti-cheat)
            // queue. Always in puzzle mode (a short, freshly launched session should open with the
            // intro), otherwise only if we last played a while ago. The queue-empty case below shows
            // its own intro, so we only force one here for a queue-restored problem (no double intro).
            // Routine reloads (page_update / return-reload) keep last_active recent, so they don't
            // trip the idle-gap branch.
            let force_intro = false;
            if(!bee.intro_gap_checked) {
                bee.intro_gap_checked = true;
                const la = bee.storage.players[bee.player].last_active;
                if(bee.is_puzzle || la === undefined || Date.now() - la > bee.intro_gap_ms) { force_intro = true; }
            }

            if(problem !== undefined) {
                log += ' from queue';
                if(problem.word_ix >= bee.words.length) { log += ' invalid'; problem = undefined; }
                else if(force_intro) { // resuming a group after a gap: introduce it
                    log += ' gap_intro';
                    intro_word_ix = intro_word_for_class(problem.word_class, problem.word_ix);
                }
            }
            if(problem === undefined) { // Get a new word/problem

                // Pick a taught class first (so coverage doesn't skew to classes with many words),
                // weighted towards easier classes and biased towards classes not yet consolidated.
                // Non-pair classes (noclass and thematic classes) carry no pair_stats, so they are
                // always accepted when picked - collecting common irregular words.
                const candidate_classes = Object.keys(bee.class_to_ix).filter(function(c) { return bee.class_to_ix[c].length > 0; });
                let word_class = undefined;
                let class_picks = 0;
                while(true) {
                    word_class = choose_class_by_level(candidate_classes);
                    class_picks++;
                    const st = bee.storage.players[bee.player].pair_stats[word_class];
                    if(!st || st[1] === 0) { break; } // never asked - teach it
                    const rate = st[0] / (st[1] + 0.4); // smoothed success rate
                    if(rate > 0.9) { if(Math.random() < 0.2) { break; } }
                    else if(rate > 0.75) { if(Math.random() < 0.5) { break; } }
                    else { break; } // <= 75% success - always teach
                    if(class_picks >= 100) { break; } // safety cap - finish with the current pick
                }
                log += ' group_class:'+word_class+' picks:'+class_picks;

                // First word of the group, from the chosen class. A non-empty class always returns
                // one (a known word if every word is already known, see try_get_new_word10).
                const word_ix = try_get_new_word10(word_class);

                log += ' first_word:'+word_ix;
                problem = {'word_ix':word_ix, 'is_repeat':false, 'word_class':word_class};
                store_question11(problem);
                intro_word_ix = word_ix; // fallback: the first word, used only if the class has no other

                const word_ixs = bee.class_to_ix[word_class];
                if(word_ixs !== undefined && word_ixs.length > 0) {
                    const desired_number_of_words = Math.min(6, word_ixs.length); // Aim for groups of 7
                    log += ' desired:'+desired_number_of_words;
                    for(let j=0; j<desired_number_of_words; j++) {
                        const group_word = try_get_new_word10(word_class);
                        log += ' group_word:'+group_word;
                        if(group_word !== undefined) {
                            store_question11({'word_ix':group_word, 'is_repeat':false, 'word_class':word_class});
                        }
                    }

                    // Prefer a random OTHER class word for the intro (don't reveal word_ix)
                    const intro_choices = word_ixs.filter(function(ix) { return ix != word_ix; });
                    if(intro_choices.length > 0) { intro_word_ix = choose_from(intro_choices); }
                }

            }
            console.log("Selecting new word:", log);
            // New groups get an intro; queue-restored problems (intro_word_ix undefined) skip it
            if(intro_word_ix !== undefined) {
                show_group_intro(intro_word_ix, problem.word_class, function() { start_question14(problem); });
            } else {
                start_question14(problem); // the first word
            }
        }

        
        // Parse word data into a data structure
        // <image_ref>@<emoji>|<text>|<class>,<class>,...
        // <image_ref>|<text>|<class>,<class>,...
        // @<emoji>|<text>|<class>,<class>,...
        //
        // <image_ref> is by default local, but is nonlocal if it starts with ~
        // The image part may be an empty string
        // The "|<class>" ending is optional
        //
        // Output: {'text':, 'class':, 'imgref'|'ref':, 'emoji':, 'proc_cache':}
        function process_word_data(datastr) {
            const data = datastr.split('|');
            if(data.length != 3 && data.length != 2) { console.error("Malformed word entry", datastr, data); }
            const img = data[0].split('@');
            const out = {
                'text': data[1],
                'class': (data[2] === undefined || data[2].length == 0 ? [] : data[2].split(','))
            };
            if(img[0].length) {
                if(img[0].startsWith('~')) {
                    out.imgref = img[0].slice(1);
                } else {
                    out.ref = img[0];
                }
            }
            if(img[1] !== undefined && img[1].length) { out.emoji = img[1]; }
            process_word_internals(out);
            return out;
        }


        // Choose an item using the levels from the list of word indices or all words if undefined
        function choose_using_levels20(list_of_wordix) {
            const word_weights_cumulative = [];
            let word_weight_sum = 0;

            // Get list of cumulative weights
            const loop_limit = (list_of_wordix === undefined ? bee.words.length : list_of_wordix.length);
            for(let i=0; i<loop_limit; i++) {
                const word_ix = (list_of_wordix === undefined ? i : list_of_wordix[i]);
                const w = Math.pow(1.5, -bee.words[word_ix].level);
                word_weight_sum += w;
                word_weights_cumulative.push(word_weight_sum);
            }
            
            const weight_point = Math.random() * word_weight_sum;
            let ix_chosen = undefined;
            for(let i=0; i<loop_limit; i++) {
                if(weight_point < word_weights_cumulative[i]) { ix_chosen = i; break; }
            }
            if(ix_chosen === undefined) { ix_chosen = loop_limit - 1; }
            
            const word_ix_chosen = (list_of_wordix === undefined ? ix_chosen : list_of_wordix[ix_chosen]);
            if(word_ix_chosen === undefined) { console.error("choose_using_levels20", list_of_wordix, weight_point, ix_chosen); }
            return word_ix_chosen;
        }


        // Weighted random choice of a class name, biased towards classes whose easiest members are
        // low-level (bee.class_level, set in init_wordlist_impl) - the same 1.5^(-level) weighting as
        // choose_using_levels20, but over classes rather than words.
        function choose_class_by_level(classes) {
            const cumulative = [];
            let sum = 0;
            for(let i=0; i<classes.length; i++) {
                sum += Math.pow(1.5, -bee.class_level[classes[i]]);
                cumulative.push(sum);
            }
            const point = Math.random() * sum;
            for(let i=0; i<classes.length; i++) {
                if(point < cumulative[i]) { return classes[i]; }
            }
            return classes[classes.length - 1];
        }
        
        
        function init_wordlist() {
            let min_wordset = bee.storage.players[bee.player].min_wordset; // min level
            if(min_wordset === undefined) { min_wordset = 0; }
            const max_wordset = bee.storage.players[bee.player].wordsets; // max level
            
            const r = init_wordlist_impl(min_wordset, max_wordset);
            bee.words = r.words;
            bee.class_to_ix = r.class_to_ix;
            bee.class_level = r.class_level;
            
            $('.d_wordsets').html(
                esc_html(min_wordset) + " to " + esc_html(max_wordset)
            );
        }
        
        
        function init_wordlist_impl(min_level, max_level) {
            // TODO min_level and max_level are unused - we load all entries (levels are also not available at this point)
            const out = {};
            
            out.words = []; // word index -> word data
            for(let i=0; i<word_repository.length; i++) {
                const wrdata = process_word_data(word_repository[i]);
                // Derive level from the number of phonemes
                wrdata.level = wrdata.proc_cache.add_words.length;
                out.words.push(wrdata);
            }

            // Classes
            out.class_to_ix = {};
            for(let i=0; i<out.words.length; i++) {
                const wd = out.words[i].proc_cache;
                const cl = out.words[i].class;
                if(wd.is_segmented) {
                    // Add classes from grapheme/phoneme pairs
                    for(let j=0; j<wd.add_words.length; j++) {
                        const gp_pair = wd.add_words[j].toLowerCase()+'/'+wd.phonemes[j];
                        if(gp_grouping_pairs[gp_pair]) {
                            cl.push(gp_pair);
                        }
                        else if(!gp_other_pairs[gp_pair]) {
                            console.error("Unknown grapheme/phoneme pair", gp_pair, wd);
                            gp_other_pairs[gp_pair] = 2;
                        }
                    }
                }
                if(cl.length == 0) { cl.push('noclass'); }
                for(let j=0; j<cl.length; j++) {
                    const thisclass = cl[j];
                    let cllist = out.class_to_ix[thisclass];
                    if(cllist === undefined) {
                        out.class_to_ix[thisclass] = []; 
                        cllist = out.class_to_ix[thisclass];
                    }
                    cllist.push(i);
                }
            }

            // Class level = mean level of a class's 4 lowest-level members - used to weight class
            // selection towards easier groups (see choose_class_by_level). Warn about pair-classes
            // too small to drill (a singleton's group intro would also reveal the answer).
            out.class_level = {};
            for(const cls in out.class_to_ix) {
                const ixs = out.class_to_ix[cls];
                if(ixs.length <= 1 && cls.indexOf('/') >= 0) {
                    console.warn("0 or 1 long pair-class (intro reveals answer / cannot drill across words):", cls, ixs.length);
                }
                const levels = ixs.map(function(ix) { return out.words[ix].level; }).sort(function(a, b) { return a-b; });
                const lowest = levels.slice(0, 4);
                out.class_level[cls] = lowest.reduce(function(a, b) { return a+b; }, 0) / (lowest.length || 1);
            }

            return out;
        }

        
        function get_question_queue() {
            delete bee.storage.players[bee.player].current_question;
            if(bee.storage.players[bee.player].scheduled_questions === undefined) {
                bee.storage.players[bee.player].scheduled_questions = [];
            }
            return bee.storage.players[bee.player].scheduled_questions;
        }

        
        function purge_question_queue() {
            bee.storage.players[bee.player].scheduled_questions = [];
        }

        
        // Record play activity time (persisted with the next save); drives the group-intro-on-return
        // gap check in new_question. Called wherever the queue is already saved.
        function mark_active() {
            if(bee.player !== false) { bee.storage.players[bee.player].last_active = Date.now(); }
        }

        // Store problem on queue, filling up undefineds first
        // Queue is also used to prevent getting a new problem when the page is refreshed
        function store_question11(problem) {
            const s = get_question_queue();
            let added = false;
            for(let i=0; i<s.length; i++) {
                if(s[i] === undefined || s[i] === null) {
                    s[i] = problem;
                    added = true;
                    break;
                }
            }
            if(!added) { s.push(problem); }
            mark_active();
            save_storage('store_question');
        }
        
        // Called if the question is answered successfully
        function queue_success() {
            get_question_queue().shift();
            mark_active();
            save_storage('queue_success');
        }
        
        // Schedule question to be shown N questions later. Adds the problem back to the queue once.
        function reschedule_question(problem) {
            console.log('reschedule_question', problem);
            const s = get_question_queue();
            s.shift(); // remove this question
            s.splice(3, 0, {'word_ix':problem.word_ix, 'word_class':problem.word_class, 'is_repeat':true});
            mark_active();
            save_storage('schedule_question');
        }
        
        // Return the first question on the queue without taking it off
        function get_first_on_queue() {
            const s = get_question_queue();
            if(s.length == 0) { return undefined; }
            const w = s[0];
            if(w === undefined) { return undefined; }
            if(typeof(w) == 'object') {
                if(w === null) { return undefined; } // JSON storing turns undefined into null
                return w; 
            }
            return undefined;
        }


        // Choose a range of word sets to show words from; result is delivered to callback([min, max])
        function choose_wordsets(callback) {
            bee_prompt("What range of levels sets should we use?\nType a number for the bottom end of the range", function(min_value) {
                let min_wordset = min_value - 0;
                if(isNaN(min_wordset)) { min_wordset = 0; }
                bee_prompt("Type a number from "+min_wordset+" for the top end of the range", function(max_value) {
                    let max_wordset = max_value - 0;
                    if(isNaN(max_wordset)) { max_wordset = 0; }
                    callback([min_wordset, max_wordset]);
                });
            });
        }

        
        function modify_wordlist() {
            if(bee.player === false) { bee_alert("Choose a player first"); return; }
            choose_wordsets(function(wordsets) {
                bee.storage.players[bee.player].min_wordset = wordsets[0];
                bee.storage.players[bee.player].wordsets = wordsets[1];
                call_local_hook('problemset_hook', [String(wordsets)]);
                purge_question_queue();
                save_storage('modify_wordlist');
                init_wordlist();
                new_question('modify_wordlist');
            });
        }
        
        
        function main() {
            data_migration();
            document.addEventListener('keydown', process_keypress); // Or use 'keypress' event

            update_score_ui(false);
            $('.d_player').html(esc_html(bee.player));
            init_wordlist();

            bee_aquarium.init_game();
            bee_aquarium.init_food();
            // Switch to aquarium tab automatically after a fish/item gift animation
            bee_aquarium.on_aquarium_gift = function() { switch_to_tab('aquarium'); };

            switch_to_tab('game');
            new_question('main');
        }
        
        // Asynchronous: choose_wordsets() prompts the user. callback() (optional) fires once done.
        function init_player_data(callback) {
            choose_wordsets(function(wordsets) {
                bee.storage.players[bee.player] = {
                    'data_version': bee_current_data_version,
                    'score': 0,
                    'min_wordset': wordsets[0],
                    'wordsets': wordsets[1],
                    'pair_stats': {}
                };
                if(callback) { callback(); }
            });
        }

    </script>
