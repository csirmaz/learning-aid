    <style>
        body { margin: .5rem 0; }
        .container { padding: 0; }
        .prompt { padding-top: 0; }
    
        .prompt .img {
            font-family: Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,Android Emoji,EmojiSymbols,EmojiOne Mozilla,Twemoji Mozilla,Segoe UI Symbol,Noto Color Emoji,EmojiOne Color,emoji;
            display: inline-block;
            font-size: 3rem;
            text-align: center;
            background: #fff;
            border-radius: 1rem;
            height: 5rem;
            line-height: 5rem;
            width: 5rem;
        }
        .prompt .img img {
            min-height: 3rem;
            max-height: 4rem;
            max-width: 4rem;
            vertical-align: -0.5rem;
            image-rendering: pixelated;
        }
        
        .prompt .infield {
            display: block;
            border-radius: 1rem;
            background: #fffae4;
            margin: 1rem 0;
            font-size: 2rem;
            line-height: 3rem;
            padding: 1rem;
            min-width: 20rem;
            min-height: 9rem;
            letter-spacing: .2rem;
        }
        
        body .prompt .infield.infield_story,
        .prompt .addwords {
            font-family: odr;
            font-size: 1rem;
            line-height: 1.7rem;
            padding: .5rem;
            letter-spacing: normal;
        }
        .prompt .addwords {
            border-radius: 1rem;
            background: #fffae4;
            margin: 1rem 0;
        }
        .prompt .addwords span {
            display: inline-block;
            border: 1px solid #05b;
            color: #05b;
            border-radius: .5rem;
            margin: 0 .5rem;
            padding: .1rem .2rem;
        }
        
        .prompt .infield .help,
        .prompt .infield .inp {
            display: inline-block;
        }

        .prompt .infield .help { color: #05b; }
        .prompt .infield .help .help_totype { background: #fff; text-decoration: underline solid #cfa .2rem; text-underline-offset: .6rem; }
        .prompt .infield_story .story_totype { background: #fff; text-decoration: underline solid #cfa .2rem; text-underline-offset: .3rem; color: #fff; }
        
        .prompt .infield .inp { color: #000; }
        .prompt .infield .inp .spacehelp { color: #ccc; }
        body .prompt .infield .success { color: #090; }
        .prompt .infield .helpwait { display: none; }

        @keyframes blink-animation { to { visibility: hidden; } }
        
        .cursor {
            animation: blink-animation 2s steps(2, start) infinite;
            display: inline-block;
            border: 2px solid #f77;
            width: .2rem;
            height: 1.5rem;
            margin-left: -1px;
            border-right: 0 solid transparent;
        }
        .infield_story .cursor { height: 1rem; width: .1rem; }
        .infield .help .cursor { visibility: hidden; }
        
        .wrongchar { text-decoration: underline dotted #05b .2rem; text-underline-offset: .6rem; }
        .infield_story .wrongchar { text-underline-offset: .3rem; }

        .kbdiv { 
            margin-top: 1rem; 
            width: 24rem;
        }
        .kbrow0 { text-align: right; }
        .kbrow1 { margin-left: .2rem; }
        .kbrow2 { margin-left: .4rem; }
        .kbrow3 { margin-left: 1.4rem; }
        .kbrow4 { margin-left: 5rem; }
        
        .kbdiv .kbkey {
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            background: #b38;
            color: #fff;
            text-shadow: 0 0 .2rem black;
            width: 2.1rem;
            height: 3rem;
            border-radius: .5rem;
            margin: .1rem;
            text-align: center;
            line-height: 3rem;
        }
        .kbdiv .kbspace { width: 11rem; background:#309; margin-right: 3rem; }
        .kbdiv .kbbksp { width: 4rem; background:#b22; }
        .kbdiv .kbhelp { background: #999; }
        .kbdiv .kbkey[data-key="'"] { background:#309; }
        .kbdiv .kbkey[data-key="a"],
        .kbdiv .kbkey[data-key="e"],
        .kbdiv .kbkey[data-key="i"],
        .kbdiv .kbkey[data-key="o"],
        .kbdiv .kbkey[data-key="u"] { background: #3b2; }
        .kbdiv .kbkey[data-key="y"],
        .kbdiv .kbkey[data-key="w"] { background: #ca2; }
        
        .kbdiv .kbkey.kbactive {
            box-shadow: 0 0 .8rem black  inset;
            outline: .2rem solid #fc0;
        }

    </style>

    <div class="container">

    <script>

        // Initialize keyboard
        $(function() {
            
            const init_kb_row = function(cls, s) {
                let o = '';
                for(let i=0; i<s.length; i++) {
                    const k = s[i];
                    o += '<span class="kbkey" data-key="'+k.toLowerCase()+'">'+k+'</span>';
                }
                $('.'+cls).html(o);
            };
            
            init_kb_row('kbrow1', 'QWERTYUIOP');
            init_kb_row('kbrow2', 'ASDFGHJKL\'');
            init_kb_row('kbrow3', 'ZXCVBNM');
            
            let $all_keys = undefined;
            setTimeout(function() {
                $all_keys = $('.kbkey');
            }, 200);
            
            const mindist = function(a, b1, b2) {
                if(b1 <= a && a <= b2) { return 0; }
                return Math.min(Math.abs(a - b1), Math.abs(a - b2));
            };
            
            const tapdistance = function(ev, element, key_width) {
                const rect = element.getBoundingClientRect();
                const d1 = mindist(ev.pageX, rect.left, rect.right)/key_width;
                const d2 = mindist(ev.pageY, rect.top, rect.bottom)/key_width;
                if(d1 == 0) { return d2; }
                if(d2 == 0) { return d1; }
                return (d1 + d2);
            };
            
            $('.kbdiv').on('click', function(ev) {
                // Correct for mistaps. Get the top keys the user may have meant.
                const key_width = $all_keys[3].getBoundingClientRect().width;
                const measurements = [];
                for(let keyix=0; keyix<$all_keys.length; keyix++) {
                    const key = $all_keys[keyix];
                    const dist = tapdistance(ev, key, key_width);
                    measurements.push([$(key).data('key'), dist]);
                }
                const top4 = measurements.sort((a,b) => a[1]-b[1]).slice(0, 4);
                process_typing('TYPING', top4, false);
                return false;
            });
            
        });

        /* EXPLANATION OF TYPED, TO_TYPE, etc.
        
            word = ['o', 'pear']
            bee.processed_word = {to_type: 'pear', to_display: 'pear', mask: false}
        
            word = ['o', 'I eat >a>p>p>l>e.']
            bee.processed_word = {to_type: 'apple', to_display: 'I eat apple.', mask: '******_____*'}
            
            word = ['#STORY', 'o', 'This {is} very {good}.']
            bee.processed_word = {to_type: 'isgood', to_display: 'This is very good.', mask: '******__******____*'}
            
            bee.typed = 'ap'
            Display: "I eat ap___."
            
            Further properties
            emoji: str
            use_tts: BOOL
            is_story: BOOL
            add_words: [str]  // if is_story
        */

        // Extract the to_type string from a word entry
        function get_processed_word(word_ix) {
            const is_story = (words[word_ix][0] == '#STORY');
            let use_tts = false;
            let wd;
            
            if(!is_story) {
                wd = words[word_ix][1];
                if(wd.indexOf('#') == 0) {
                    use_tts = true;
                    wd = wd.substring(1);
                }
                if(wd.indexOf('>') == -1 && wd.indexOf('{') == -1) { 
                    return {
                        'to_type': wd, 
                        'to_display': wd, 
                        'mask': false, 
                        'use_tts': use_tts, 
                        'is_story': is_story, 
                        'emoji': words[word_ix][0]
                    };
                }
            } else { // is_story
                wd = words[word_ix][2];
            }
            
            let to_type_str = '';
            let to_disp_str = '';
            let mask_str = '';
            const add_words = [];
            let current_add_word = '';
            const full = wd;
            let next_type = false;  // next character is typed
            let in_type = false;  // in typing mode
            for(let i=0; i<full.length; i++) {
                if(full[i] == '>') { next_type = true; continue; }
                if(full[i] == '{') { in_type = true; current_add_word = ''; continue; }
                if(full[i] == '}') { in_type = false; add_words.push(current_add_word); continue; }
                if(next_type || in_type) { 
                    to_type_str += full[i];
                    to_disp_str += full[i];
                    current_add_word += full[i];
                    mask_str += '_';
                    if(next_type) { next_type = false; }
                    continue; 
                } else {
                    to_disp_str += full[i];
                    mask_str += '*';
                }
            }
            shuffle(add_words);
            return {
                'to_type': to_type_str, 
                'to_display': to_disp_str, 
                'mask': mask_str, 
                'use_tts': use_tts, 
                'is_story': is_story, 
                'emoji': (is_story ? words[word_ix][1] : words[word_ix][0]),
                'add_words': add_words
            };
        }
        
        
        function render_addwords() {
            let o = '';
            for(let i=0; i<bee.processed_word.add_words.length; i++) {
                o += '<span>'+bee.processed_word.add_words[i]+'</span>';
            }
            return o;
        }

        
        // Render a typed input into HTML. prefix=what is typed, s=full string
        function render_to_html(for_help) {
            const line_length = 15; // word wrap after this many characters (for non-stories)
    
            const s = bee.processed_word.to_display;
            
            // The aim is to leave the underscores in place, so we word wrap according to the target string
            // With a story, wrap_at stays empty and so there is no forced wrapping
            const wrap_at = {};
            if(!bee.processed_word.is_story) {
                let cur_line = 0;
                for(let i=0; i<s.length; i++) {
                    cur_line++;
                    if(cur_line >= line_length) {
                        wrap_at[i] = 'forced';
                        cur_line = 0;
                        continue;
                    }
                    if(s[i] == ' ') {
                        let is_full = true;
                        for(let j=1; j<=line_length-cur_line; j++) { // lookahead
                            // console.log("ij", i, j, cur_line);
                            if(i+j >= s.length || s[i+j] == ' ') { 
                                is_full = false; 
                                break; 
                            }
                        }
                        if(is_full) {
                            wrap_at[i] = 'at space';
                            cur_line = 0;
                        }
                    }
                }
            }
            // console.log(wrap_at);
            
            let o = '';
            let typed_ix = 0;
            for(let i=0; i<s.length; i++) {
                const totype = (bee.processed_word.mask === false || bee.processed_word.mask[i] == '_'); // whether the character is to be typed
                
                if(for_help) { // We are rendering the help string
                
                    if(totype) { // We are in the area that should be typed
                        o += '<span class="help_totype">';
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        o += '</span>';
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                    
                } else { // We are rendering what the user entered, plus surrounding phrase
                
                    if(totype) { // We are in the area that should be typed
                        if(typed_ix < bee.typed.length) { // The user typed this much
                            const userchar = bee.typed[typed_ix];
                            const wrongchar = (s[i].toLowerCase() != userchar.toLowerCase());
                            if(wrongchar) { o += '<span class="wrongchar">'; }
                            o += (userchar == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(userchar));
                            if(wrongchar) { o += '</span>'; }
                            if(wrap_at[i]) { o += '<br>'; }
                        } else { // The user is still to type this
                            if(typed_ix == bee.typed.length) { o += '<span class="cursor"></span>'; } // add cursor at beginning if no char typed
                            if(bee.processed_word.is_story) {
                                o += '<span class="story_totype">'+esc_html(s[i])+'</span>';
                            } else {
                                o += (s[i] == ' ' ? '<span class="spacehelp">_</span>' : '_');
                            }
                            if(wrap_at[i]) { o += '<br>'; }
                        }
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                
                }
            }
            return o;
        }
        
        
        // Render the typing and underscores
        function update_input_field() {
            bee.$input.html(render_to_html(false));
        }


        // Display target word briefly
        function show_help(is_initial) {
            console.log("Disabling help");
            if(bee.processed_word.is_story) {
                bee.$help.hide();

            if(!is_initial) { 
                bee.$helpwait.show(); // show a loading animation

            const help_duration_loading = 1800; // duration of the loading animation
            const help_duration_1 = (is_initial ? 700 : 1200) + bee.processed_word.to_display.length * 160; // full color
            const help_duration_2 = 1500; // fading
            const help_duration_enable = 4400; // time to enable help again

            setTimeout(function() {
                bee.$helpwait.hide();
                bee.$help.show();
                play_word();
                setTimeout(function() {
                    bee.$help.fadeOut({duration: help_duration_2, complete: function() {
                        bee.$input.show();

                        bee.help_timeout = setTimeout(function(){ 
                            console.log("Enabling help");
                            bee.can_use_help = true;
                            bee.help_timeout = false;

                    }});
                }, help_duration_1); // initial wait while showing the word
            }, is_initial ? 0 : help_duration_loading);
        }
        
                
        // Mark a word as known, and count how many times it was successfully entered
        // A word is known if it could be typed without help
        function add_known_word(word) {
            if(!bee.storage.players[bee.player].known_words) {

        function reset_known_words() {

        // Return the count of successful entries of a word
        function is_known_word(word) {
            if(bee.storage.players[bee.player].known_words) {

        // Play the mp3 assigned to a word
        function play_word() {
            let s = bee.processed_word.to_display;

            if(bee.word_audio_timeout !== false) {

        function highlight_key(selector) {
            const $keyelem = $(selector);
            $keyelem.addClass('kbactive');
            setTimeout(function(){ $keyelem.removeClass('kbactive'); }, 200);
        }
        
        
        function process_typing(group, key_distances, is_direct) {
            if(group == 'TYPING') {
                if(!bee.can_type) { playme('notavail'); return; }
                
                let typed_key = undefined;
                if(is_direct) {
                    typed_key = key_distances;
                } else {
                    // Check if the user could have meant the next correct character
                    if(bee.typed.length < bee.processed_word.to_type.length) {
                        const desired_char = bee.processed_word.to_type[bee.typed.length];
                        for(let i=0; i<key_distances.length; i++) {
                            if(key_distances[i][1] < .5 /* ratio to key width */ && key_distances[i][0].toLowerCase() == desired_char.toLowerCase()) {
                                typed_key = desired_char; break;
                            }
                        }
                    }
                    if(typed_key === undefined) { 
                        if(key_distances[0][1] > .5) { return; }
                        typed_key = key_distances[0][0];
                    }
                }
                
                if(typed_key == 'BACKSPACE') {
                    if(bee.typed.length > 0) {
                        bee.typed = bee.typed.substring(0, bee.typed.length-1);
                        update_input_field();
                        bee.backspace_used++;
                        highlight_key('.kbdiv .kbbksp');
                    }
                    return;
                }

                if(typed_key == 'HELP') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(!bee.can_use_help) { playme('notavail'); return; }
                    show_help(false);
                    return;
                }
                if(typed_key == 'PLAY_WORD') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    play_word();
                    return;
                }

                if(bee.typed.length < bee.processed_word.to_type.length) {
                    bee.typed += typed_key;
                    update_input_field();
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key.toLowerCase()+'"]');
                    
                    if(bee.typed.toLowerCase() == bee.processed_word.to_type.toLowerCase()) { // Success!
                        bee.can_type = false;
                        console.log('success help=', bee.help_asked, 'backspace=', bee.backspace_used);
                        if(bee.help_asked == 0 && bee.backspace_used < 3) {
                            queue_success();
                            if(bee.backspace_used < 2) {
                                add_known_word(bee.processed_word.to_type);
                            }
                        } else {
                            reschedule_question(bee.word_ix);
                        }
                        bee.$input.addClass('success');
                        success_common({'skip_this_score':bee.is_repeat});

                        if(typeof(bee_local) !== 'undefined' && bee_local.success_hook) {
                            bee_local.success_hook(bee.word_ix, words[bee.word_ix][1], bee.player, bee.help_asked, -1);
                        }
                    }
                }
                return;
            }
        }

            if(event.keyCode == 8) { // backspace

                return false;

            // console.log("key", event);

        function new_question(reason) {
            console.log('#new_question() caller=', reason);
            page_update();
            
            try{ document.activeElement.blur(); }catch(e){}
            
            let problem = get_question_from_store();
            let log = '';
            if(problem !== undefined) {
                log += ' from store';
                if(problem.word_ix >= words.length) { problem = undefined; }
            }
            if(problem === undefined) {
                let word_ix;
                while(true) {
                    word_ix = Math.floor(Math.random() * words.length);
                    log += " w:"+word_ix;
                    // ensure we choose a new word
                    if(words.length > 1 && bee.word_ix !== false && word_ix == bee.word_ix) { log += ' norep'; continue; }

                    const procword = get_processed_word(word_ix);
                    const known_count = is_known_word(procword.to_type);
                    log += " k:"+known_count;
                    if(known_count == 2 && Math.random() < .5) { log += ' no2'; continue; }
                    if(known_count > 2 && Math.random() < .75) { log += ' no2+'; continue; }
                    if(known_count > 5 && Math.random() < .9) { log += ' no5+'; continue; }
                    break;
                }
                problem = {'word_ix':word_ix, 'is_repeat':false};
            }
            console.log("Selecting new word:", problem, log);
            store_question2(problem);
            start_question2(problem);
        }
        
        
        // Choose a range of word sets to show words from
        function choose_wordsets() {
            const num_wordsets = word_sets.length - 1;
            let min_wordset = prompt("What range of word sets should we use?\nType a number from 0 to "+num_wordsets+" (simple to difficult) for the bottom end of the range") - 0;
            if(isNaN(min_wordset)) { min_wordset = 0; }
            let max_wordset = prompt("Type a number from "+min_wordset+" to "+num_wordsets+" (simple to difficult) for the top end of the range") - 0;
            if(isNaN(max_wordset)) { max_wordset = 0; }
            return [min_wordset, max_wordset];
        }
        
        
        function init_wordlist() {
            words = [];
            min_wordset = bee.storage.players[bee.player].min_wordset;
            if(min_wordset === undefined) { min_wordset = 0; }
            max_wordset = bee.storage.players[bee.player].wordsets;
            for(let i=min_wordset; i<=max_wordset; i++) {
                words = words.concat(word_sets[i]);
            }
            if(words.length == 0) { words.push(no_words_available); }
            $('.d_wordsets').html(
                esc_html(min_wordset) + " to " + 
                esc_html(max_wordset) + " (" + words.length + " words)"
            );
        }
        
        /*
            Before getting a new question:    [a, b]         | [b, undef, A] | [undef, A]
                                                             |               |
            new_question():                                  |               |
            After get_question_from_store:    [b]            | [undef, A]    | [A]
            After store_question:             [A, b]         | [B, undef, A] | [X, A]
                                                             |               |
            Finish:                                          |               |
            successful                        [b]            | [undef, A]*   | [A]
            reschedule                        [b, undef, A]* | [undef, A, B] | [A, undef, X]
        */
        
        function get_question_queue() {
            delete bee.storage.players[bee.player].current_question;
            if(bee.storage.players[bee.player].scheduled_questions === undefined) {
                bee.storage.players[bee.player].scheduled_questions = [];
            }
            return bee.storage.players[bee.player].scheduled_questions;
        }
        
        function purge_question_queue() {
            bee.storage.players[bee.player].scheduled_questions = [];
        }
        
        // Prevent getting a new question when the page is refreshed
        function store_question2(problem) {
            const s = get_question_queue();
            s.unshift(problem);
            save_storage('store_question');
            // Html rendering for debugging
            let o='';
            for(let i=0; i<s.length; i++) {
                if(o.length) { o += ','; }
                try {
                    if(s[i] === undefined) { o += 'u'; }
                    else { o += s[i].word_ix; }
                } catch(e) {
                    o += 'ERROR';
                }
            }
            $('.d_queue').html('['+o+']');
        }
        
        function queue_success() {
            get_question_queue().shift();
            save_storage('queue_success');
        }
        
        // Schedule question to be shown 2 questions later
        function reschedule_question(word_ix) {
            const s = get_question_queue();
            s.shift();
            while(s.length < 2) { s.push(undefined); }
            s.push({'word_ix':word_ix, 'is_repeat':true});
            save_storage('schedule_question');
        }
        
        // Return stored or scheduled questions
        function get_question_from_store() {
            const w = get_question_queue().shift(); // undefined returned on empty
            if(w === undefined) { return undefined; }
            if(typeof(w) == 'object') {
                if(w === null) { return undefined; } // unsure why this would happen
                return w; 
            }
            return undefined;
        }
        
        
        function modify_wordlist() {
            if(bee.player === false) { alert("Choose a player first"); return; }
            const wordsets = choose_wordsets();
            bee.storage.players[bee.player].min_wordset = wordsets[0];
            bee.storage.players[bee.player].wordsets = wordsets[1];
            if(typeof(bee_local) !== 'undefined' && bee_local.problemset_hook) {
                bee_local.problemset_hook(String(wordsets));
            }
            purge_question_queue();
            save_storage('modify_wordlist');
            init_wordlist();
            new_question('modify_wordlist');
        }
        
        
        function main() {
            document.addEventListener('keydown', process_keypress); // Or use 'keypress' event

            update_score_ui(false);
            $('.d_player').html(esc_html(bee.player));
            init_wordlist();
            new_question('main');
        }
        

        // Start menu - render
        // Audio can only be played after a user event on the page, so we require a click
        menu = "<p>Choose player</p>";
        for (const [key, value] of Object.entries(bee.storage.players)) {
            menu += '<div class="startbutton" data-player="'+esc_html(key)+'">'+esc_html(key)+'</div>';
        }
        menu += '<div class="startbutton" data-playernew="1">New user<br><span style="font-size:60%">All player data is stored in the browser only</span></div>';
        $('.game').hide();
        $('.startmenu').html(menu);
        
        // Start menu - logic
        setTimeout(function() {  // allow time for rendering
            $('.startbutton').on('click', function() {
                
                if($(this).data('playernew')) {
                    bee.player = prompt("What is the name of the player?");
                    if(bee.player === null || bee.player === '') { return false; }

                    // Initialize
                    if(!bee.storage.players[bee.player]) {
                        const wordsets = choose_wordsets();
                        bee.storage.players[bee.player] = {'score': 0, 'min_wordset': wordsets[0], 'wordsets': wordsets[1]};
                        save_storage('init');
                    } else {
                        alert("That player already exists. Loading player data");
                    }
                } else {
                    bee.player = $(this).data('player');
                }
                
                $('.startmenu').hide();
                $('.game').show();
                main();
                return false;
            });
        }, 200);
        
    </script>

</body>
</html>
