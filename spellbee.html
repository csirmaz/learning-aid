    <style>
        body { margin: .5rem 0; }
        .container { padding: 0; }
        .prompt { padding-top: 0; }
    
        .prompt .img {
            font-family: Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,Android Emoji,EmojiSymbols,EmojiOne Mozilla,Twemoji Mozilla,Segoe UI Symbol,Noto Color Emoji,EmojiOne Color,emoji;
            display: inline-block;
            font-size: 3rem;
            text-align: center;
            background: #fff;
            border-radius: 1rem;
            height: 5rem;
            line-height: 5rem;
            width: 5rem;
        }
        .prompt .img img {
            min-height: 3rem;
            max-height: 4rem;
            max-width: 4rem;
            vertical-align: -0.5rem;
            image-rendering: pixelated;
        }
        
        .prompt .infield {
            display: block;
            border-radius: 1rem;
            background: #fffae4;
            margin: 1rem 0;
            font-size: 2rem;
            line-height: 3rem;
            padding: 1rem;
            min-width: 20rem;
            min-height: 9rem;
            letter-spacing: .2rem;
        }
        
        body .prompt .infield.infield_story,
        .prompt .addwords {
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 2rem;
            padding: .5rem;
            letter-spacing: .1rem;
        }
        .prompt .addwords {
            border-radius: 1rem;
            background: #fffae4;
            margin: 1rem 0;
        }
        .prompt .addwords span {
            display: inline-block;
            border: 1px solid #05b;
            color: #05b;
            border-radius: .5rem;
            margin: 0 .5rem;
            padding: .1rem .2rem;
        }
        
        .prompt .infield .help,
        .prompt .infield .inp {
            display: inline-block;
        }

        .prompt .infield .help { color: #05b; }
        .prompt .infield .help .help_totype  { background: #fff; text-decoration: underline solid #cfa .2rem; text-underline-offset: .6rem; }
        .prompt .infield_story .story_totype { background: #fff; text-decoration: underline solid #cfa .2rem; text-underline-offset: .3rem; color: #fff; }
        .prompt .infield .reveal_totype      { background: #fff; text-decoration: underline solid #cfa .2rem; text-underline-offset: .6rem; color: #ccc; }
        .prompt .infield_story .reveal_totype  { text-underline-offset: .3rem; }
        
        .prompt .infield .inp { color: #000; }
        .prompt .infield .inp .spacehelp { color: #ccc; }
        body .prompt .infield .success { color: #090; }
        .prompt .infield .helpwait { display: none; }

        @keyframes blink-animation { to { visibility: hidden; } }
        
        .cursor_outer { position: relative; }
        .cursor {
            animation: blink-animation 2s steps(2, start) infinite;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            border: 2px solid #f77;
            width: .2rem;
            height: 1.5rem;
            margin-left: -1px;
            border-right: 0 solid transparent;
        }
        .infield_story .cursor { height: 1.2rem; width: .1rem; }
        .infield .help .cursor { visibility: hidden; }
        
        .wrongchar { text-decoration: underline dotted #05b .2rem; text-underline-offset: .6rem; }
        .infield_story .wrongchar { text-underline-offset: .3rem; }

        .kbdiv { 
            margin-top: 1rem; 
            width: 24rem;
        }
        .kbrow0 { text-align: right; }
        .kbrow1 { margin-left: .2rem; }
        .kbrow2 { margin-left: .4rem; }
        .kbrow3 { margin-left: 1.4rem; }
        .kbrow4 { margin-left: 5rem; }
        
        .kbdiv .kbkey {
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            background: #b38;
            color: #fff;
            text-shadow: 0 0 .2rem black;
            width: 2.1rem;
            height: 3rem;
            border-radius: .5rem;
            margin: .1rem;
            text-align: center;
            line-height: 3rem;
        }
        .kbdiv .kbspace { width: 11rem; background:#309; margin-right: 3rem; }
        .kbdiv .kbbksp { width: 4rem; background:#b22; }
        .kbdiv .kbhelp { background: #999; }
        .kbdiv .kbkey[data-key="'"] { background:#309; }
        .kbdiv .kbkey[data-key="a"],
        .kbdiv .kbkey[data-key="e"],
        .kbdiv .kbkey[data-key="i"],
        .kbdiv .kbkey[data-key="o"],
        .kbdiv .kbkey[data-key="u"] { background: #3b2; }
        .kbdiv .kbkey[data-key="y"],
        .kbdiv .kbkey[data-key="w"] { background: #ca2; }
        
        .kbdiv .kbkey.kbactive {
            box-shadow: 0 0 .8rem black  inset;
            outline: .2rem solid #fc0;
        }

    </style>

    <script>
    
        const bee_current_data_version = 4; // used for new players
        
        function data_migration() {
            if(bee.player === false) { console.warn('no player to migrate'); return; }
            const pstore = bee.storage.players[bee.player];
            let version = pstore.data_version;
            if(version === undefined) { version = 0; }
            
            // [1] Migrate known_words[to_type] to known_questions[question text]
            if(version < 4 && bee.words.length > 0) {
                version = 4;
                if(pstore.known_questions === undefined) { pstore.known_questions = {}; }
                if(pstore.known_words !== undefined) {
                    for(let i=0; i<bee.words.length; i++) {
                        const word = get_processed_word(i).to_type;
                        const k = pstore.known_words[word];
                        if(k !== undefined && k != 0) {
                            pstore.known_questions[bee.words[i].text] = k;
                        }
                    }
                }
                // alert("Migrated datastore to version "+version);
            }
            
            // [2] Add further migrations here
            
            if(pstore.data_version != version) {
                pstore.data_version = version;
                save_storage('data migration');
            }
        }

        // Initialize keyboard
        $(function() {
            
            const init_kb_row = function(cls, s) {
                let o = '';
                for(let i=0; i<s.length; i++) {
                    const k = s[i];
                    o += '<span class="kbkey" data-key="'+k.toLowerCase()+'">'+k+'</span>';
                }
                $('.'+cls).html(o);
            };
            
            init_kb_row('kbrow1', 'QWERTYUIOP');
            init_kb_row('kbrow2', 'ASDFGHJKL\'');
            init_kb_row('kbrow3', 'ZXCVBNM');
            
            let $all_keys = undefined;
            setTimeout(function() {
                $all_keys = $('.kbkey');
            }, 200);
            
            const mindist = function(a, b1, b2) {
                if(b1 <= a && a <= b2) { return 0; }
                return Math.min(Math.abs(a - b1), Math.abs(a - b2));
            };
            
            const tapdistance = function(ev, element, key_width) {
                const rect = element.getBoundingClientRect();
                const d1 = mindist(ev.pageX, rect.left, rect.right)/key_width;
                const d2 = mindist(ev.pageY, rect.top, rect.bottom)/key_width;
                if(d1 == 0) { return d2; }
                if(d2 == 0) { return d1; }
                return (d1 + d2);
            };
            
            $('.kbdiv').on('click', function(ev) {
                // Correct for mistaps. Get the top keys the user may have meant.
                const key_width = $all_keys[3].getBoundingClientRect().width;
                const measurements = [];
                for(let keyix=0; keyix<$all_keys.length; keyix++) {
                    const key = $all_keys[keyix];
                    const dist = tapdistance(ev, key, key_width);
                    measurements.push([$(key).data('key'), dist]);
                }
                const top4 = measurements.sort((a,b) => a[1]-b[1]).slice(0, 4);
                process_typing('TYPING', top4, false);
                return false;
            });
            
        });

        /* EXPLANATION OF TYPED, TO_TYPE, etc.

        // Extract the to_type string from a word entry
        function get_processed_word(word_ix) {
            const word_data = bee.words[word_ix];
            if(word_data.proc_cache !== undefined) {
                return word_data.proc_cache;
            }
            
            let to_type_str = '';
            let to_disp_str = '';
            let mask_str = '';
            const add_words = []; // words user needs to type in a story
            let current_add_word = '';
            const full = word_data.text;
            let in_type = false;  // in typing mode
            for(let i=0; i<full.length; i++) {
                if(full[i] == '<') { in_type = true; current_add_word = ''; continue; }
                if(full[i] == '>') { in_type = false; add_words.push(current_add_word); continue; }
                if(in_type) { 
                    to_type_str += full[i];
                    to_disp_str += full[i];
                    current_add_word += full[i];
                    mask_str += '_';
                    continue; 
                } else {
                    to_disp_str += full[i];
                    mask_str += '*';
                }
            }
            const proc = {
                'to_type': to_type_str, 
                'to_display': to_disp_str, 
                'mask': mask_str, 
                'use_tts': !word_data.mp3, 
                'is_story': !!word_data.story, 
                'emoji': word_data.emoji,
                'ref': word_data.ref,
                'add_words': add_words // TODO only if story
            };
            word_data.proc_cache = proc;
            return proc;
        }
        
        
        // Render words user needs to type in a story
        function render_addwords() {
            shuffle(bee.processed_word.add_words); // WARNING changes array
            let o = '';
            for(let i=0; i<bee.processed_word.add_words.length; i++) {
                o += '<span>'+bee.processed_word.add_words[i]+'</span>';
            }
            return o;
        }

        
        // Render a typed input into HTML. prefix=what is typed, s=full string
        function render_to_html(for_help) {
            const line_length = 15; // word wrap after this many characters (for non-stories)
    
            const s = bee.processed_word.to_display;
            
            // The aim is to leave the underscores in place, so we word wrap according to the target string
            // With a story, wrap_at stays empty and so there is no forced wrapping
            const wrap_at = {};
            if(!bee.processed_word.is_story) {
                let cur_line = 0;
                for(let i=0; i<s.length; i++) {
                    cur_line++;
                    if(cur_line >= line_length) {
                        wrap_at[i] = 'forced';
                        cur_line = 0;
                        continue;
                    }
                    if(s[i] == ' ') {
                        let is_full = true;
                        for(let j=1; j<=line_length-cur_line; j++) { // lookahead
                            // console.log("ij", i, j, cur_line);
                            if(i+j >= s.length || s[i+j] == ' ') { 
                                is_full = false; 
                                break; 
                            }
                        }
                        if(is_full) {
                            wrap_at[i] = 'at space';
                            cur_line = 0;
                        }
                    }
                }
            }
            // console.log(wrap_at);
            
            let o = '';
            let typed_ix = 0;
            for(let i=0; i<s.length; i++) {
                const totype = (bee.processed_word.mask === false || bee.processed_word.mask[i] == '_'); // whether the character is to be typed
                
                if(for_help) { // We are rendering the help string
                
                    if(totype) { // We are in the area that should be typed
                        o += '<span class="help_totype">';
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        o += '</span>';
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                    
                } else { // We are rendering the input field
                
                    if(totype) { // We are in the area that should be typed
                        if(typed_ix < bee.typed.length) { // The user typed this much
                            const userchar = bee.typed[typed_ix];
                            const wrongchar = (s[i].toLowerCase() != userchar.toLowerCase());
                            if(wrongchar) { o += '<span class="wrongchar">'; }
                            if(userchar == ' ') {
                                if((!bee.processed_word.is_story) || wrongchar) { o += '&nbsp;'; } else { o += ' '; }
                            } else {
                                o += esc_html(userchar);
                            }
                            if(wrongchar) { o += '</span>'; }
                            if(wrap_at[i]) { o += '<br>'; }
                        } else { // The user is still to type this
                            if(typed_ix == bee.typed.length) { 
                                o += '<span class="cursor_outer"><span class="cursor"></span></span>';
                            } 
                            if(bee.problem.is_reveal) {
                                o += '<span class="reveal_totype">';
                                o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                                o += '</span>';
                            } else if(bee.processed_word.is_story) {
                                o += '<span class="story_totype">'+esc_html(s[i])+'</span>';
                            } else {
                                o += (s[i] == ' ' ? '<span class="spacehelp">_</span>' : '_');
                            }
                            if(wrap_at[i]) { o += '<br>'; }
                        }
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                
                }
            }
            return o;
        }
        
        
        // Render the typing and underscores
        function update_input_field() {
            bee.$input.html(render_to_html(false));
        }


        // Display target word briefly
        function show_help(is_initial) {
            console.log("Disabling help");
            if(bee.processed_word.is_story) {
                bee.$help.hide();
                bee.$input.show();
                update_input_field();
                call_local_hook('keyboard_press_hook', [undefined]);
                return; 
            }
            
            bee.can_use_help = false;
            if(bee.help_timeout !== false) { clearTimeout(bee.help_timeout); }

            bee.can_type = false;
            bee.$input.hide();
            
            if(!is_initial) { 
                bee.$helpwait.show(); // show a loading animation
                bee.help_asked++;
            }
            
            const help_duration_loading = 1800; // duration of the loading animation
            const help_duration_1 = (is_initial ? 700 : 1200) + bee.processed_word.to_display.length * 120; // full color, max time while playing
            const help_duration_2 = 1000 + bee.processed_word.to_display.length * 70; // fading
            const help_duration_3 = 700; // nothing shown
            const help_duration_enable = 4400; // time to enable help again

            setTimeout(function() {
                bee.$helpwait.hide();
                bee.$help.show();
                play_word(function() {
                    bee.$help.fadeOut({duration: help_duration_2, complete: function() {
                        setTimeout(function() {
                            bee.$input.show();
                            update_input_field();
                            call_local_hook('keyboard_press_hook', [undefined]);
                            bee.can_type = true;
                            console.log("Scheduling enabling help");
                            bee.help_timeout = setTimeout(function(){ 
                                console.log("Enabling help");
                                bee.can_use_help = true;
                                bee.help_timeout = false;
                            }, help_duration_enable);
                        }, help_duration_3);
                    }});
                }, help_duration_1, is_initial);
            }, is_initial ? 0 : help_duration_loading);
        }
        
                
        // Mark a word as known, and count how many times it was successfully entered
        // A word is known if it could be typed without help
        function add_known_word() {
            data_migration();
            const pstore = bee.storage.players[bee.player];
            
            // TODO remove known_words
            const word = bee.processed_word.to_type;
            if(!pstore.known_words) { pstore.known_words = {}; }
            if(pstore.known_words[word] === undefined) { pstore.known_words[word] = 1; } else { pstore.known_words[word]++; }
            
            const q = bee.words[bee.problem.word_ix].text;
            if(!pstore.known_questions) { pstore.known_questions = {}; }
            if(pstore.known_questions[q] === undefined) { pstore.known_questions[q] = 1; } else { pstore.known_questions[q]++; }
            save_storage('add_known_word');
        }
        
        
        function reset_known_words() {
            const pstore = bee.storage.players[bee.player];
            if(pstore.known_words) { pstore.known_words = {}; }
            if(pstore.known_questions) { pstore.known_questions = {}; }
            save_storage('reset_known_words');
            alert('List of known words reset');
        }
        
        
        // Return the count of successful entries of a word
        function is_known_word(word_ix) {
            data_migration();
            const q = bee.words[word_ix].text;
            
            if(bee.storage.players[bee.player].known_questions) {
                const c = bee.storage.players[bee.player].known_questions[q];
                if(c === undefined) { return 0; }
                return c;
            }
            return 0;
        }
        

        // Play the mp3 assigned to a word
        function play_word(callback, max_timeout, force) {
            let s = bee.processed_word.to_display;

            if(force && bee.word_audio_timeout !== false) {
                clearTimeout(bee.word_audio_timeout);
                bee.word_audio_timeout = false;
            }
            if(bee.word_audio_timeout !== false) { // prevent playing word too frequently
                console.log("skipping play_word due to timeout");
                return; 
            }
            bee.word_audio_timeout = setTimeout(function() { bee.word_audio_timeout = false; }, 3000);
            
            if(bee.processed_word.use_tts) {
                bee_tts.speak(s, callback);
                return;
            }
            
            s = s.toLowerCase().replaceAll(/ /g, '_').replaceAll(/[^a-z_]/g, '');
            const file = 'assets/sounds/words/'+s+'.mp3';
            
            let has_ended = false;
            const do_end = function(){
                if(has_ended) { return; }
                has_ended = true;
                if(callback) { callback(); }
            };
            
            if(max_timeout !== undefined) { setTimeout(do_end, max_timeout); }
            const word_audio = new Audio(audio.success[0].file);
            word_audio.volume = 1;            
            try {
                word_audio.src = file;
                word_audio.addEventListener('ended', (e) => { do_end(); });
                word_audio.addEventListener('stalled', (e) => { do_end(); });
                word_audio.play();
            } catch(e) {
                console.log("Error during play_word", e);
                do_end();
            }
        }
        
        
        function highlight_key(selector) {
            const $keyelem = $(selector);
            $keyelem.addClass('kbactive');
            setTimeout(function(){ $keyelem.removeClass('kbactive'); }, 200);
            call_local_hook('keyboard_press_hook', [$keyelem]);
        }
        
        
        function process_typing(group, key_distances, is_direct) {
            if(group == 'TYPING') {
                if(!bee.can_type) { playme('notavail'); return; }
                
                let typed_key = undefined;
                if(is_direct) {
                    typed_key = key_distances;
                } else {
                    // Check if the user could have meant the next correct character
                    if(bee.typed.length < bee.processed_word.to_type.length) {
                        const desired_char = bee.processed_word.to_type[bee.typed.length];
                        for(let i=0; i<key_distances.length; i++) {
                            if(key_distances[i][1] < .5 /* ratio to key width */ && key_distances[i][0].toLowerCase() == desired_char.toLowerCase()) {
                                typed_key = desired_char; break;
                            }
                        }
                    }
                    if(typed_key === undefined) { 
                        if(key_distances[0][1] > .5) { return; }
                        typed_key = key_distances[0][0];
                    }
                }
                
                if(typed_key == 'BACKSPACE') {
                    if(bee.typed.length > 0) {
                        bee.typed = bee.typed.substring(0, bee.typed.length-1);
                        update_input_field();
                        bee.backspace_used++;
                        highlight_key('.kbdiv .kbbksp');
                    }
                    return;
                }

                if(typed_key == 'HELP') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(!bee.can_use_help) { playme('notavail'); return; }
                    show_help(false);
                    return;
                }
                if(typed_key == 'PLAY_WORD') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(bee.processed_word.is_story) { return; }
                    play_word();
                    return;
                }

                if(bee.typed.length < bee.processed_word.to_type.length) {
                    bee.typed += typed_key;
                    update_input_field();
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key.toLowerCase()+'"]');
                    
                    if(bee.typed.toLowerCase() == bee.processed_word.to_type.toLowerCase()) { // Success!
                        bee.can_type = false;
                        bee.$input.addClass('success');
                        
                        let outcome = 'UNSURE';
                        if(bee.problem.is_repeat) {
                            outcome = 'OK';
                        } else if(bee.help_asked > 0) {
                            outcome = 'ASK_ALL';
                        } else {
                            if(bee.processed_word.is_story) {
                                if(bee.backspace_used <= 2) {
                                    outcome = 'ADD_KNOWN';
                                } else if(bee.backspace_used <= 3) {
                                    outcome = 'OK';
                                } else if(bee.backspace_used <= 5) {
                                    outcome = 'ASK_ONCE';
                                } else {
                                    outcome = 'ASK_ALL';
                                }
                            } else { // Not story
                                if(bee.backspace_used <= 1) {
                                    outcome = 'ADD_KNOWN';
                                } else if(bee.backspace_used <= 2) {
                                    outcome = 'OK';
                                } else if(bee.backspace_used <= 3) {
                                    outcome = 'ASK_ONCE';
                                } else {
                                    outcome = 'ASK_ALL';
                                }
                            }
                        }
                        console.log('success help=', bee.help_asked, 'backspace=', bee.backspace_used, 'outcome=', outcome);
                        
                        if(outcome == 'ADD_KNOWN') {
                            queue_success();
                            add_known_word();
                        } else if(outcome == 'ASK_ONCE') {
                            reschedule_question2(bee.problem, false);
                        } else if(outcome == 'ASK_ALL') {
                            reschedule_question2(bee.problem, true);
                        } else { // 'OK'
                            queue_success();
                        }
                        
                        /* 
                        call_local_hook('success_hook', [bee.problem.word_ix, bee.words[bee.problem.word_ix].text, bee.player, bee.help_asked, -1]);
                        */

                        const on_success = function() {
                            success_common({'skip_this_score':bee.problem.is_repeat});
                        };

                        if(bee.processed_word.is_story && !bee.problem.is_reveal) { play_word(on_success, undefined, true); } else { on_success(); }
                    }
                }
                return;
            }
        }

        
        function process_keypress(event) {
            event.preventDefault = true;
            
            if((event.keyCode >= 65 && event.keyCode <= 90) || event.keyCode == 32) { // a-z, space
                process_typing('TYPING', event.key, true);
                return false;
            }
            
            if(event.keyCode == 8) { // backspace
                process_typing('TYPING', 'BACKSPACE', true);
                return false;
            }
             
            /*
            if(event.keyCode == 49) { // 1
                process_typing('TYPING', 'HELP', true);
                return false;
            }
            
            if(event.keyCode == 50) { // 2
                process_typing('TYPING', 'PLAY_WORD', true);
                return false;
            }
            
            if(event.keyCode == 51) {
                toggle_play_music(0);
                return false;
            } 
            */

            // console.log("key", event);
        }

        
        // Initialize a question
        function start_question2(problem) {
            bee.problem = problem; // {word_ix:, is_repeat:, is_reveal:}
            if(bee.help_timeout !== false) { clearTimeout(bee.help_timeout); bee.help_timeout = false; }

            bee.processed_word = get_processed_word(bee.problem.word_ix);

            // Show picture
            if(bee.processed_word.ref !== undefined && local_hook_has('emoji_ref')) {
                bee.$image.html(bee_local.emoji_ref(bee.processed_word.ref));
            }
            else {
                if(bee.processed_word.emoji === undefined) {
                    bee.$image.html('?');
                } else {
                    let emoji = bee.processed_word.emoji;
                    // Ensure emoji code ends in picture modifier
                    if(emoji[emoji.lenght-1] != "\ufe0f") { emoji += "\ufe0f"; }
                    bee.$image.html(esc_html(emoji));
                }
            }
            
            // Add help & input
            bee.typed = '';
            bee.help_asked = 0;
            bee.backspace_used = 0;

            if(!bee.processed_word.is_story) { 
                bee.$help.html(render_to_html(true));
                $('.prompt .addwords').hide();
                $('.kbdiv .kbhelp').css({'visibility': 'visible'});
            } else {
                $('.prompt .addwords').html(render_addwords()).show();
                $('.kbdiv .kbhelp').css({'visibility': 'hidden'}); // TTS works fine but let's force reading
            }
            bee.$input.html('');
            $('.prompt .infield').toggleClass('infield_story', !!bee.processed_word.is_story);
            bee.$input.removeClass('success');
            
            bee.can_type = true;
            bee.can_use_help = true;
            call_local_hook('start_question_hook', []);
            show_help(true);
        }
        
        
        // Returns whether to use this item (true) or choose another one (false)
        function known_score_to_choice(score) {
            let limit = 0;
            if(score < 2) { return true; }
            if(score == 2) { limit = .9; }
            else if(score == 3) { limit = .95; }
            else { limit = .99; }
            return (Math.random() > limit);
        }
        
        
        function try_get_new_word(word_class) {
            let trials = 50;
            
            let word_ix = undefined;
            let log = 'needclass:'+word_class;
            const queue = get_question_queue();
            
            
            while(trials > 0) {
                log += ' trials:'+trials;
                trials--;
                
                if(word_class !== undefined) { // We have a desired word class (subsequent words)
                    const ixs = bee.class_to_ix[word_class];
                    if(ixs === undefined) { log += ' class_not_found'; break; }
                    if(ixs.length == 0) { log += ' class_empty'; break; }
                    // Choose using levels
                    word_ix = choose_using_levels(ixs);
                    log += ' wix:'+word_ix+" lev:"+bee.words[word_ix].level;
                    // ensure we choose a new word (check the queue)
                    if(trials > 0) {
                        let dupl = false;
                        for(let i=0; i<queue.length; i++) {
                            if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                        }
                        if(dupl) { log += ' norep'; continue; }
                    }
                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice(known_count)) { log += ' no'; continue; }
                    break;
                }
                
                if(word_class === undefined) { // first word
                    // Choose using levels
                    word_ix = choose_using_levels(undefined); // undefined:from all words
                    log += " wix:"+word_ix+" lev:"+bee.words[word_ix].level;
                    // ensure we choose a new word (check the queue)
                    if(bee.words.length > 1 && trials > 0) {
                        let dupl = false;
                        for(let i=0; i<queue.length; i++) {
                            if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                        }
                        if(dupl) { log += ' norep'; continue; }
                    }
                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice(known_count)) { log += ' no'; continue; }
                    break;
                }
                    
                
            }
            console.log('try_get_new_word: '+log);
            if(trials == 0) { return undefined; }
            return word_ix;
        }
        
        
        function new_question(reason) {
            console.log('#new_question() caller=', reason);
            page_update();
            
            try{ document.activeElement.blur(); }catch(e){}
            
            let problem = get_first_on_queue();
            let log = '';            
            if(problem !== undefined) {
                log += ' from queue';
                if(problem.word_ix >= bee.words.length) { log += ' invalid'; problem = undefined; }
            }
            if(problem === undefined) { // Get some new words
            
                let word_ix = undefined;
                while(true) {
                    word_ix = try_get_new_word(undefined); // first word in class group
                    if(word_ix === undefined) { alert('No first word found, trying again'); continue; }
                    break;
                }
                log += ' first_word:'+word_ix;
                problem = {'word_ix':word_ix, 'is_repeat':false};
                store_question2(problem);
                
                // Word class group
                let word_class = bee.words[word_ix].class;
                if(word_class === undefined || word_class.length == 0) { word_class = ['noclass:']; }
                word_class = word_class[Math.floor(Math.random() * word_class.length)];
                log += ' group_class:'+word_class;
                
                const word_ixs = bee.class_to_ix[word_class];
                if(word_ixs !== undefined && word_ixs.length > 0) {
                    const desired_number_of_words = Math.min(5, word_ixs.length); // Aim for groups of 6
                    log += ' desired:'+desired_number_of_words;
                    for(let j=0; j<desired_number_of_words; j++) {
                        const group_word = try_get_new_word(word_class);
                        log += ' group_word:'+group_word;
                        if(group_word !== undefined) {
                            store_question2({'word_ix':group_word, 'is_repead':false});
                        }
                    }
                }

            }
            console.log("Selecting new word:", log);
            render_question_queue();
            start_question2(problem); // the first word
        }
        
        
        // Choose a range of word sets to show words from
        function choose_wordsets() {
            let min_wordset = prompt("What range of levels sets should we use?\nType a number for the bottom end of the range") - 0;
            if(isNaN(min_wordset)) { min_wordset = 0; }
            let max_wordset = prompt("Type a number from "+min_wordset+" for the top end of the range") - 0;
            if(isNaN(max_wordset)) { max_wordset = 0; }
            return [min_wordset, max_wordset];
        }
        
        
        function init_wordlist_impl(min_level, max_level) {
            const out = {};
            
            out.words = [];
            for(let i=0; i<word_repository.length; i++) {
                if(word_repository[i].level >= min_level && word_repository[i].level <= max_level) {
                    out.words.push(word_repository[i]);
                }
            }

            // Classes
            out.class_to_ix = {};
            for(let i=0; i<out.words.length; i++) {
                let cl = out.words[i].class;
                if(cl === undefined || cl.length == 0) { cl = ['noclass:']; }
                for(let j=0; j<cl.length; j++) {
                    const thisclass = cl[j];
                    let cllist = out.class_to_ix[thisclass];
                    if(cllist === undefined) { out.class_to_ix[thisclass] = []; cllist = out.class_to_ix[thisclass]; }
                    cllist.push(i);
                }
            }
            
            return out;
        }
        

        // Choose an item using the levels from the list of word indices or all words if undefined
        function choose_using_levels(list_of_wordix) {
            const word_weights_cumulative = [];
            let word_weight_sum = 0;

            // Get list of cumulative weights
            const loop_limit = (list_of_wordix === undefined ? bee.words.length : list_of_wordix.length);
            for(let i=0; i<loop_limit; i++) {
                const word_ix = (list_of_wordix === undefined ? i : list_of_wordix[i]);
                const w = Math.pow(2, -bee.words[word_ix].level);
                word_weight_sum += w;
                word_weights_cumulative.push(word_weight_sum);
            }
            
            const weight_point = Math.random() * word_weight_sum;
            let ix_chosen = undefined;
            for(let i=0; i<loop_limit; i++) {
                if(weight_point < word_weights_cumulative[i]) { ix_chosen = i; break; }
            }
            if(ix_chosen === undefined) { ix_chosen = loop_limit - 1; }
            
            const word_ix_chosen = (list_of_wordix === undefined ? ix_chosen : list_of_wordix[ix_chosen]);
            if(word_ix_chosen === undefined) { console.error("choose_using_levels", list_of_wordix, weight_point, ix_chosen); }
            return word_ix_chosen;
        }
        
        
        function init_wordlist() {
            const min_wordset = bee.storage.players[bee.player].min_wordset; // min level
            if(min_wordset === undefined) { min_wordset = 0; }
            const max_wordset = bee.storage.players[bee.player].wordsets; // max level
            
            const r = init_wordlist_impl(min_wordset, max_wordset);
            bee.words = r.words;
            bee.class_to_ix = r.class_to_ix;
            
            $('.d_wordsets').html(
                esc_html(min_wordset) + " to " + 
                esc_html(max_wordset) + " (" + bee.words.length + " words)"
            );
        }
        
        
        function get_question_queue() {
            delete bee.storage.players[bee.player].current_question;
            if(bee.storage.players[bee.player].scheduled_questions === undefined) {
                bee.storage.players[bee.player].scheduled_questions = [];
            }
            return bee.storage.players[bee.player].scheduled_questions;
        }
        
        function purge_question_queue() {
            bee.storage.players[bee.player].scheduled_questions = [];
        }
        
        function render_question_queue() {
            // Html rendering for debugging
            const s = get_question_queue();
            let o='';
            for(let i=0; i<s.length; i++) {
                if(o.length) { o += ','; }
                try {
                    if(s[i] === undefined) { o += 'u'; }
                    else if(s[i] === null) { o += 'n'; }
                    else { 
                        o += s[i].word_ix;
                        if(s[i].is_repeat) { o += 'R'; }
                        if(s[i].is_reveal) { o += 'V'; }
                    }
                } catch(e) {
                    o += 'ERROR';
                }
            }
            $('.d_queue').html('['+o+']');
        }
        
        // Store problem on queue, filling up undefineds first
        // Queue is also used to prevent getting a new problem when the page is refreshed
        function store_question2(problem) {
            const s = get_question_queue();
            let added = false;
            for(let i=0; i<s.length; i++) {
                if(s[i] === undefined || s[i] === null) {
                    s[i] = problem; added = true; break;
                }
            }
            if(!added) { s.push(problem); }
            save_storage('store_question');
        }
        
        // Called if the question is answered successfully
        function queue_success() {
            get_question_queue().shift();
            save_storage('queue_success');
        }
        
        // Schedule question to be shown N questions later
        function reschedule_question2(problem, add_reveal) {
            const s = get_question_queue();
            s.shift(); // remove this question
            while(s.length < 3) { s.push(undefined); }
            s.splice(3, 0, {'word_ix':problem.word_ix, 'is_repeat':true, 'is_reveal':false});
            if(add_reveal) {
                s.splice(1, 0, {'word_ix':problem.word_ix, 'is_repeat':true, 'is_reveal':true});
            }
            save_storage('schedule_question');
        }
        
        // Return the first question on the queue without taking it off
        function get_first_on_queue() {
            const s = get_question_queue();
            if(s.length == 0) { return undefined; }
            const w = s[0];
            if(w === undefined) { return undefined; }
            if(typeof(w) == 'object') {
                if(w === null) { return undefined; } // JSON storing turns undefined into null
                return w; 
            }
            return undefined;
        }
        
        
        function modify_wordlist() {
            if(bee.player === false) { alert("Choose a player first"); return; }
            const wordsets = choose_wordsets();
            bee.storage.players[bee.player].min_wordset = wordsets[0];
            bee.storage.players[bee.player].wordsets = wordsets[1];
            call_local_hook('problemset_hook', [String(wordsets)]);
            purge_question_queue();
            save_storage('modify_wordlist');
            init_wordlist();
            new_question('modify_wordlist');
        }
        
        
        function main() {
            document.addEventListener('keydown', process_keypress); // Or use 'keypress' event

            update_score_ui(false);
            $('.d_player').html(esc_html(bee.player));
            init_wordlist();
            new_question('main');
        }
        

        // Start menu - render
        // Audio can only be played after a user event on the page, so we require a click
        menu = "<p>Choose player</p>";
        for (const [key, value] of Object.entries(bee.storage.players)) {
            menu += '<div class="startbutton" data-player="'+esc_html(key)+'">'+esc_html(key)+'</div>';
        }
        menu += '<div class="startbutton" data-playernew="1">New user<br><span style="font-size:60%">All player data is stored in the browser only</span></div>';
        $('.game').hide();
        $('.startmenu').html(menu);
        
        // Start menu - logic
        setTimeout(function() {  // allow time for rendering
            $('.startbutton').on('click', function() {
                
                if($(this).data('playernew')) {
                    bee.player = prompt("What is the name of the player?");
                    if(bee.player === null || bee.player === '') { return false; }

                    // Initialize
                    if(!bee.storage.players[bee.player]) {
                        const wordsets = choose_wordsets();
                        bee.storage.players[bee.player] = {
                            'data_version': bee_current_data_version,
                            'score': 0, 
                            'min_wordset': wordsets[0], 
                            'wordsets': wordsets[1]
                        };
                        save_storage('init');
                    } else {
                        alert("That player already exists. Loading player data");
                    }
                } else {
                    bee.player = $(this).data('player');
                }
                
                data_migration();
                $('.startmenu').hide();
                $('.game').show();
                main();
                return false;
            });
        }, 200);
        
    </script>
    <div class="footercontent"></div>

</body>
