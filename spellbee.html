    <style>
        body { margin: .5rem 0; }
        .container { padding: 0; }
        .prompt { padding-top: 0; }
    
        /* Shared emoji font stack for the word-image containers */
        .emojifont {
            font-family: Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,Android Emoji,EmojiSymbols,EmojiOne Mozilla,Twemoji Mozilla,Segoe UI Symbol,Noto Color Emoji,EmojiOne Color,emoji;
        }

        .prompt .img {
            display: inline-block;
            font-size: 3rem;
            text-align: center;
            background: #fff;
            border-radius: 1rem;
            height: 5rem;
            line-height: 5rem;
            width: 5rem;
        }
        .prompt .img img {
            min-height: 3rem;
            max-height: 4rem;
            max-width: 4rem;
            vertical-align: -0.5rem;
            image-rendering: pixelated;
        }
        
        .prompt .infield {
            display: block;
            background: #fffae4;
            margin: 1rem 0;
            font-size: 2rem;
            line-height: 2.5rem;
            padding: 1rem;
            min-width: 20rem;
            min-height: 7rem;
            letter-spacing: .18rem;
        }
        
        body .prompt .infield.infield_story,
        .prompt .addwords {
            font-size: 1rem;
            line-height: 1.6rem;
            padding: .5rem;
            letter-spacing: .08rem;
            border-radius: 0;
        }
        body .prompt .infield.infield_story {
            padding-bottom: 0;
        }
        .prompt .addwords {
            background: #fffae4;
            padding: 0.5rem;
        }
        .prompt .addwords .word {
            display: inline-block;
            border: 1px solid #05b;
            color: #05b;
            border-radius: .5rem;
            margin: 0 .5rem;
            padding: 0 .5rem;
        }
        /* The in-focus segment's chip in the segmented word bank: a purple '?' card (render_addwords),
           matching the in-focus box border (typebox_focus). Sits before the .word.done rule so the
           grey 'done' style (equal specificity, later in source) still wins once the part is solved. */
        .prompt .addwords .word.word_focus { color: #a0c; border-color: #a0c; }
        
        .prompt .infield .help,
        .prompt .infield .inp {
            display: inline-block;
        }
        
        .prompt .infield .help .help_totype,
        .prompt .infield_story .story_totype {
            background: #fff; /* #fffaf0; */ /* must match .prompt .infield_story .story_totype color */
            text-decoration: underline solid rgba(119,238,0,.6) .2rem;
            text-underline-offset: .6rem;
        }

        .prompt .infield .help { color: #05b; }
        .prompt .infield_story .story_totype { text-underline-offset: .3rem; color: #fff; /* #fffaf0; */ }
        
        .prompt .infield .inp { color: #000; }
        .prompt .infield .inp .spacehelp { color: #ccc; }
        body .prompt .infield .success { color: #090; }
        .prompt .infield .helpwait { display: none; }

        /* Segmented (phoneme / morpheme) question type: parts typed into boxes */
        body .prompt .infield.infield_segmented {
            font-size: 1.2rem;
            line-height: 2.5rem;
            letter-spacing: .12rem;
            overflow-x: auto;
            padding-block: .35rem;   /* vertical room so the solve-time bounce (scale) doesn't trip the overflow-x scroller */
        }
        .prompt .infield_segmented .typebox_wrap { white-space: nowrap; }
        .prompt .infield_segmented .typebox {
            display: inline-block;
            /* content-box: the box is pre-sized to its part and doesn't grow as the child types */
            box-sizing: content-box;
            min-width: 1.5rem;   /* overridden inline per box; see render_segmented_input for the width */
            min-height: 2rem;    /* = line-height, so a typed line box fits without enlarging the box */
            line-height: 2rem;
            margin: 0 .15rem;
            padding: .1rem .3rem;
            border: 1px solid #05b;
            border-radius: .4rem;
            text-align: left;
            vertical-align: middle;
            background: #fff;
            cursor: pointer;     /* tap a box to hear its phoneme (delegated handler in the kb init) */
        }
        /* A completed segment turns green (all correct) or red (a mistake somewhere) */
        .prompt .infield_segmented .typebox.typebox_ok  { background: #e2f5d9; border-color: #3a3; }
        .prompt .infield_segmented .typebox.typebox_err { background: #f6d2d2; border-color: #c33; }
        /* The in-focus grapheme/phoneme pair (the group being taught) keeps a purple border - the
           group-intro .gi_match colour - even once the box is completed; the ok/err background still
           shows correctness. This rule sits after ok/err so the purple border wins on a completed
           in-focus box (equal specificity, later in source). It also keeps the full 2px width while
           the other boxes are thinner (1px), so the in-focus box stands out and directs the eye. */
        .prompt .infield_segmented .typebox.typebox_focus { border-width: 2px; border-color: #a0c; }
        /* On solve, a single inflate-deflate refocuses the in-focus box(es), fired apart from the
           score/confetti animation (see segmented_focus_refocus). */
        @keyframes seg_focus_bounce { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .prompt .infield_segmented .typebox.seg_focus_bounce { animation: seg_focus_bounce .5s ease-in-out 1; }
        .prompt .addwords .word.done { color: #ccc; border-color: #ddd; }
        /* Split-digraph link ('/X' segment): a rounded half-box joining a tensed vowel box to its
           silent-e box; drawn green once the vowel is correct (see draw_segment_connectors) */
        .prompt .infield_segmented .inp { position: relative; }
        .prompt .infield_segmented .segbox_link {
            position: absolute;
            height: .6rem;               /* how far the link drops below the boxes */
            border: 2px solid #3a3;       /* the split-digraph connector, kept 2px */
            border-top: none;             /* bottom half of a box only */
            border-bottom-left-radius: .4rem;
            border-bottom-right-radius: .4rem;
            box-sizing: border-box;
            pointer-events: none;
        }
        /* Morpheme-boundary bar ('==' in the word text): a thin neutral vertical divider drawn between
           two adjacent boxes to show a morpheme seam (e.g. micro|scope). Purely visual - inserted into
           the box run by render_segmented_input, and ignored by draw_segment_connectors' .typebox scan. */
        .prompt .infield_segmented .morph_bar {
            display: inline-block;
            width: .5rem;
            height: 3rem;
            background: #f3dcbd;
            border-radius: 1px;
            vertical-align: middle;
        }

        /* Group intro splash (show_group_intro): image + an example word with the group's grapheme
           highlighted (.gi_match), shown in .startmenu with .game hidden */
        .groupintro { text-align: center; padding: 2rem 1rem; }
        .groupintro .gi_image {
            font-size: 4.5rem;
            line-height: 1.2;
            min-height: 5rem;
            margin-bottom: 2rem;
        }
        .groupintro .gi_image img {
            max-height: 8rem;
            max-width: 8rem;
            image-rendering: pixelated;
        }
        .groupintro .gi_word { font-size: 2.6rem; line-height: 3.5rem; letter-spacing: .15rem; }
        .groupintro .gi_match {
            color: #a0c;
            text-decoration: underline solid #a0c .2rem;
            text-underline-offset: .5rem;
        }

        @keyframes blink-animation { to { visibility: hidden; } }
        
        .cursor_outer { position: relative; }
        .cursor {
            animation: blink-animation 2s steps(2, start) infinite;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            border: 2px solid #f00;
            width: .2rem;
            height: 1.5rem;
            margin-left: -1px;
            border-right: 0 solid transparent;
        }
        .aged-paper .cursor { border: 2px solid #000; }
        .infield_story .cursor { height: 1.2rem; width: .1rem; }
        .infield .help .cursor { visibility: hidden; }
        
        .wrongchar { text-decoration: underline dotted #05b .2rem; text-underline-offset: .6rem; }
        .infield_story .wrongchar { text-underline-offset: .3rem; }

        .kbdiv { 
            min-width: 23rem;
            margin: 1rem 0.2rem;
        }
        .kbrow0 { text-align: right; }
        .kbrow1 { margin-left: .2rem; }
        .kbrow2 { margin-left: .4rem; }
        .kbrow3 { margin-left: 1.4rem; }
        .kbrow4 { margin-left: 5rem; }
        
        .kbdiv .kbkey {
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            /* background: #b38; */
            background: #444;
            text-shadow: 0 0 .2rem black;
            transition: color 0.3s ease;
            color: #fff;
            width: 2.1rem;
            height: 3rem;
            border-radius: .5rem;
            margin: .1rem;
            text-align: center;
            line-height: 3rem;
        }
        .kbdiv .kbspace { width: 11rem; /* background:#309; */ margin-right: 2.5rem; }
        .kbdiv .kbbksp { width: 4rem; /* background:#b22; */ color: #e00; font-size: 150%; }
        .kbdiv .kbhelp { background: #999; }
        .kbdiv .kbkey[data-key="'"] { /* background:#309; */ }
        .kbdiv .kbkey[data-key="a"],
        .kbdiv .kbkey[data-key="e"],
        .kbdiv .kbkey[data-key="i"],
        .kbdiv .kbkey[data-key="o"],
        .kbdiv .kbkey[data-key="u"] { /* background: #3b2; */ color: #7e0; }
        .kbdiv .kbkey[data-key="y"],
        .kbdiv .kbkey[data-key="w"] { /* background: #ca2; */ color: #e90; }
        
        .kbdiv .kbkey.kbactive {
            /* box-shadow: 0 0 .8rem black inset; */
            box-shadow: 0 0 .8rem #ccc inset;
            outline: .3rem solid #e90;
        }
        body .kbdiv.kbdisabled .kbkey { color: rgba(255,255,255,0.7); }

            // Consonants

            's': 1,     // /s/ as in "sun"
            't': 1,     // /t/ as in "top"
            'v': 1,     // /v/ as in "van"
            'z': 1,     // /z/ as in "zip"
            'S': 1,     // /ʃ/ as in "she"
            'ks': 1,    // /ks/ as in "excellent"
            'dZ': 1,    // /dʒ/ as in "George"

            'ts': 1,    // /ts/
            'T': 1,     // /θ/ as in "thin"
            'D': 1,     // /ð/ as in "this"
            'Z': 1,     // /ʒ/ as in "vision"
            //
            'j': 1,     // /j/ as in "you"
            'w': 1,     // /w/ as in "wet"
            'sl': 1,    // syllabic l
            // Short (lax) vowels
            'ae': 1,    // /æ/ as in "cat"
            'A': 1,     // /ʌ/ as in "cup"
            'o': 1,     // /ɒ/ as in "hot"
            'E': 1,     // /ə/ schwa, as in "about"
            'Er': 1,    // /ə/ (r-coloured /ɚ/ in rhotic accents) the "-er" ending, as in "teacher"
            'e': 1,     // /e/ short "e" as in "pen"
            'I': 1,     // /ɪ/ lax (short) "i" as in "fish"
            'U': 1,     // /ʊ/ as in "put"
            // Long (tense) vowels
            'i:': 1,    // /iː/ as in "see"
            'u:': 1,    // /uː/ as in "food"
            'a:': 1,    // /ɑː/ as in "car"
            'O:': 1,    // /ɔː/ as in "corn"

        // Application data
        const bee = {

            puzzle_needs: 4, // how many successes before puzzle is dismissed

            words: [],  // words in the selected level range
            class_to_ix: false, // {wordclass:[word_ix, ...
            problem: false, // current problem {word_ix:, word_class:, is_repeat:}
            processed_word: false,

    <script>
    
        const bee_current_data_version = 5; // used for new players

        function data_migration() {
            if(bee.player === false) { console.warn('no player to migrate'); return; }
            const pstore = bee.storage.players[bee.player];
            let version = pstore.data_version;
            if(version === undefined) { version = 0; }
            
            // [2] Add further migrations here

            if(version < 5) {
                // Pair-keyed coverage selection: drop the full-text success record (now replaced by
                // known_words[to_type], see is_known_word) and add the per-pair coverage stats.
                delete pstore.known_questions;
                if(!pstore.pair_stats) { pstore.pair_stats = {}; }
                version = 5;
            }
            
            if(pstore.data_version != version) {
                pstore.data_version = version;
                save_storage('data migration');
            }
        }
        
        function disable_typing() {
            if(bee.can_type) {
                bee.can_type = false;
                $('.kbdiv').addClass('kbdisabled');
            }
        }
        
        function enable_typing() {
            if(!bee.can_type) {
                bee.can_type = true;
                $('.kbdiv').removeClass('kbdisabled');
                $('.kbdiv .kbkey').removeClass('kbdisabledkey');
            }
        }

        // Initialize keyboard
        $(function() {
            
            const init_kb_row = function(cls, s) {
                let o = '';
                for(let i=0; i<s.length; i++) {
                    const k = s[i];
                    o += '<span class="kbkey" data-key="'+k.toLowerCase()+'">'+k+'</span>';
                }
                $('.'+cls).html(o);
            };
            
            init_kb_row('kbrow1', 'QWERTYUIOP');
            init_kb_row('kbrow2', 'ASDFGHJKL\'');
            init_kb_row('kbrow3', 'ZXCVBNM');
            
            let $all_keys = undefined;
            setTimeout(function() {
                $all_keys = $('.kbkey');
            }, 200);
            
            const mindist = function(a, b1, b2) {
                if(b1 <= a && a <= b2) { return 0; }
                return Math.min(Math.abs(a - b1), Math.abs(a - b2));
            };
            
            const tapdistance = function(ev, element, key_width) {
                const rect = element.getBoundingClientRect();
                const d1 = mindist(ev.pageX, rect.left, rect.right)/key_width;
                const d2 = mindist(ev.pageY, rect.top, rect.bottom)/key_width;
                if(d1 == 0) { return d2; }
                if(d2 == 0) { return d1; }
                return (d1 + d2);
            };
            
            $('.kbdiv').on('click', function(ev) {
                // Correct for mistaps. Get the top keys the user may have meant.
                const key_width = $all_keys[3].getBoundingClientRect().width;
                const measurements = [];
                for(let keyix=0; keyix<$all_keys.length; keyix++) {
                    const key = $all_keys[keyix];
                    const dist = tapdistance(ev, key, key_width);
                    measurements.push([$(key).data('key'), dist]);
                }
                const top4 = measurements.sort((a,b) => a[1]-b[1]).slice(0, 4);
                process_typing('TYPING', top4, false);
                return false;
            });

            // Tap a segmented box to (re)hear its phoneme. Delegated on the persistent .inp so it
            // survives the re-render every keystroke does.
            bee.$input.on('click', '.typebox', function() {
                if(!bee.can_type) { return; } // no box-tap phoneme while typing is disabled (e.g. during the success phoneme process)
                if(!bee.processed_word || !bee.processed_word.is_segmented) { return; }
                play_phoneme(bee.processed_word.phonemes[$(this).data('seg')]);
            });

        });

        /* EXPLANATION OF TYPED, TO_TYPE, etc.
        
            word = 'This <is> very <good>.'
            bee.processed_word = {to_type: 'isgood', to_display: 'This is very good.', mask: '******__******____*'}
            
            bee.typed = 'ap'
            Display: "I eat ap___."
            
            Further properties
            emoji: str
            ref: str
            is_story: BOOL
            add_words: [str]  // if is_story

            SEGMENTED type: a word/sentence whose <..> parts are joined by '=', e.g.
            'They <m>=<e>=<n>=<tion>=<ed> my name'. The '=' is only a separator (never shown
            or typed). Sets is_segmented (instead of is_story); the ordered parts are add_words
            and the layout (surrounding text vs. the typed run) comes from to_display / mask.
            A '==' separator is a normal separator that additionally marks a morpheme boundary:
            render draws a vertical divider bar between those two boxes (boundaries[], parallel to
            add_words). It never merges a morpheme into one box - the boxes stay per-grapheme.
        */

        // Extract the to_type string from a word entry
        function process_word_internals(word_data) {            
            let to_type_str = '';
            let to_disp_str = '';
            let mask_str = '';
            const add_words = []; // words to type in a story / segments (parts) in a segmented word
            const phonemes = []; // parallel to add_words: ascii phoneme id to voice each segment (see phoneme_sounds)
            const connectors = []; // parallel to add_words: true if the segment draws a split-digraph link (see '/X' below)
            const boundaries = []; // parallel to add_words: true if a morpheme-boundary bar is drawn before this box (see '==' below)
            const full = word_data.text;
            // Segmented <..>: '='-separated segments, each optionally "grapheme/phoneme" (else
            // segment_default_phoneme). '/X' = silent + split-digraph link, folded to 'x'. A '=='
            // separator additionally marks a morpheme boundary - a divider bar before the next box.
            const is_segmented = (full.indexOf('=') !== -1);
            let in_type = false;    // inside a <..> region
            let in_phoneme = false; // reading the phoneme id after a '/'
            let seg_grapheme = '';  // characters of the current segment (typed + displayed)
            let seg_phoneme = '';   // explicit phoneme id of the current segment, if any
            let pending_boundary = false; // a '==' was seen: the next flushed segment starts a new morpheme

            // Finish the current segment: record its grapheme and its (explicit or default) phoneme
            const flush_segment = function() {
                let ph = seg_phoneme.length ? seg_phoneme : default_phoneme(seg_grapheme);
                // '/X' = silent + split-digraph link: fold to the silent phoneme 'x' and record the
                // link so render draws a line back to the vowel box two boxes to the left.
                const has_link = (ph === 'X');
                if(has_link) { ph = 'x'; }
                add_words.push(seg_grapheme);
                phonemes.push(ph);
                connectors.push(has_link);
                boundaries.push(pending_boundary); // morpheme boundary before this box, set by a preceding '=='
                pending_boundary = false;
                // Flag segments whose phoneme is missing from the master list (a typo, or a
                // grapheme with no default and no explicit /phoneme yet)
                if(is_segmented && phoneme_sounds[ph] === undefined) {
                    console.error('Unknown phoneme', JSON.stringify(ph), 'for segment', JSON.stringify(seg_grapheme), 'in', JSON.stringify(full));
                }
                seg_grapheme = '';
                seg_phoneme = '';
                in_phoneme = false;
            };

            for(let i=0; i<full.length; i++) {
                const ch = full[i];
                if(!in_type) { // text around the <..> region
                    if(ch == '<') { in_type = true; seg_grapheme = ''; seg_phoneme = ''; in_phoneme = false; continue; }
                    to_disp_str += ch;
                    mask_str += '*';
                    continue;
                }
                // Inside a <..> region
                if(ch == '>') { flush_segment(); in_type = false; continue; }
                if(ch == '=') { // segment separator; '==' also opens a new morpheme (a divider bar before the next box)
                    flush_segment();
                    if(full[i+1] === '=') { pending_boundary = true; i++; } // consume the second '=' of '=='
                    continue;
                }
                if(ch == '/') { in_phoneme = true; continue; } // explicit phoneme id follows
                if(in_phoneme) { seg_phoneme += ch; continue; } // phoneme id char (metadata only)
                // Grapheme character: typed and displayed
                to_type_str += ch;
                to_disp_str += ch;
                seg_grapheme += ch;
                mask_str += '_';
            }

            if(add_words.length==0) { console.error('Nothing to type in', word_data); }

            const proc = {
                'to_type': to_type_str,
                'to_display': to_disp_str,
                'mask': mask_str,
                'is_story': (add_words.length > 1) && !is_segmented,
                'is_segmented': is_segmented,
                'emoji': word_data.emoji,
                'ref': word_data.ref,
                'imgref': word_data.imgref,
                'add_words': add_words,
                'phonemes': phonemes,
                'connectors': connectors,
                'boundaries': boundaries,
                'level': word_data.level
            };
            word_data.proc_cache = proc;
        }
        
        
        // Render the word bank below the prompt: the shuffled parts to copy from. Each chip carries
        // data-seg (its part index) so update_completed_chips() greys it as its part is completed.
        // Stories tile every word. A segmented question also tiles its parts, but:
        //   - a predictable pair (predictable_pairs) that is NOT in focus gets no chip - the child
        //     produces it unaided from the sound;
        //   - the in-focus pair(s) show as a purple '?' card (word_focus) instead of the grapheme.
        // The HELP key (bee.help_full_bar) tiles every segment plainly - the child asking to see
        // everything - so full mode may not depend on the predictability judgement here.
        function render_addwords() {
            const parts = bee.processed_word.add_words;
            const phonemes = bee.processed_word.phonemes;
            const segmented = bee.processed_word.is_segmented;
            const show_all = bee.help_full_bar;
            const focus_pair = (bee.problem && bee.problem.word_class) || '';
            const gp_pair = function(ix) { return parts[ix].toLowerCase()+'/'+phonemes[ix]; };
            const is_focus = function(ix) { return focus_pair.indexOf('/') >= 0 && gp_pair(ix) === focus_pair; };

            const chips = [];
            for(let i=0; i<parts.length; i++) {
                if(segmented && !show_all) {
                    if(is_focus(i)) { chips.push('<span class="word word_focus" data-seg="'+i+'">?</span>'); continue; }
                    if(predictable_pairs[gp_pair(i)]) { continue; } // predictable pair: no chip, produced unaided
                }
                chips.push('<span class="word" data-seg="'+i+'">'+esc_html(parts[i])+'</span>');
            }
            shuffle(chips); // WARNING changes array
            return chips.join('');
        }


        // Classify a segment for the per-pair coverage stats (see pair_stat). Mirrors the word-bank
        // logic in render_addwords: the in-focus pair is produced unaided ('focus'); a predictable
        // non-focus pair is given no chip ('obvious'); any other non-focus pair is shown as a tile
        // ('revealed'). Returns {pair, kind}.
        function classify_segment(i) {
            const pw = bee.processed_word;
            const pair = pw.add_words[i].toLowerCase()+'/'+pw.phonemes[i];
            const focus = (bee.problem && bee.problem.word_class) || '';
            if(focus.indexOf('/') >= 0 && pair === focus) { return {'pair':pair, 'kind':'focus'}; }
            if(predictable_pairs[pair]) { return {'pair':pair, 'kind':'obvious'}; }
            return {'pair':pair, 'kind':'revealed'};
        }


        // ---- Multi-part words (stories and segmented) ----

        // Greedy map of bee.typed onto the ordered parts (add_words): a part is 'finished' once
        // enough chars are typed to fill it. Returns {completed, starts:[to_type index per part]}.
        function parts_progress() {
            const parts = bee.processed_word.add_words;
            const starts = [];
            let start = 0;
            let completed = 0;
            for(let i=0; i<parts.length; i++) {
                starts.push(start);
                if(bee.typed.length >= start + parts[i].length) { completed++; }
                start += parts[i].length;
            }
            return {'completed': completed, 'starts': starts};
        }

        // Status of a part (start, len): 'pending', 'ok' (all correct) or 'error'. Colours the boxes.
        function segment_status(start, len) {
            if(bee.typed.length < start + len) { return 'pending'; }
            const to_type = bee.processed_word.to_type;
            for(let p=start; p<start+len; p++) {
                if(to_type[p].toLowerCase() != bee.typed[p].toLowerCase()) { return 'error'; }
            }
            return 'ok';
        }

        // Grey the word-bank chips of correctly-completed parts, matched by data-seg (set in
        // render_addwords). A wrongly-typed part isn't greyed; a part with no chip (a predictable
        // segment) simply has nothing to grey. Derived from bee.typed, nothing persisted.
        function update_completed_chips() {
            const prog = parts_progress();
            const parts = bee.processed_word.add_words;
            const $chips = $('.prompt .addwords .word');
            $chips.removeClass('done');
            for(let k=0; k<prog.completed; k++) {
                if(segment_status(prog.starts[k], parts[k].length) != 'ok') { continue; } // don't grey a wrongly-typed part
                $chips.filter('[data-seg="'+k+'"]').addClass('done');
            }
        }


        // ---- Segmented (phoneme / morpheme) question type ----

        // Play the clip for a phoneme (ascii id; 'x' is silent). Audio objects are cached; callback
        // fires when it finishes.
        const phoneme_sound_objs = {};
        function play_phoneme(phoneme, callback) {
            if(phoneme_sound_objs[phoneme] === undefined) {
                phoneme_sound_objs[phoneme] = {
                    file: 'assets/sounds/phonemes/ph_' + phoneme.replaceAll(/[^a-zA-Z0-9]/g, '_') + '.mp3',
                    volume: .7,
                    object: false
                };
            }
            _play_obj(phoneme_sound_objs[phoneme], callback);
        }

        // Voice a finished segment. phoneme is its ascii id (see play_phoneme).
        function speak_completed_part(part, phoneme) {
            play_phoneme(phoneme);
            console.log('segmented part completed:', part, 'phoneme:', phoneme);
        }

        // On solving a segmented word, draw attention back to the in-focus grapheme/phoneme pair:
        // bounce its box(es) once and re-voice the pair's phoneme, then a short pause, then continue.
        // Kept apart in time from the score/confetti reward so it reads as "here is the bit you just
        // learned", not decoration. No-op when the word has no in-focus grouping pair (word_class
        // 'noclass') or the pair has no phoneme clip.
        function segmented_focus_refocus(callback) {
            const done = callback || function() {};
            const wc = (bee.problem && bee.problem.word_class) || '';
            if(!bee.processed_word || !bee.processed_word.is_segmented || wc.indexOf('/') < 0) { done(); return; }
            const phoneme = wc.split('/')[1];
            if(phoneme === undefined || phoneme_sounds[phoneme] === undefined) { done(); return; }
            const parts = bee.processed_word.add_words;
            const phonemes = bee.processed_word.phonemes;
            const $boxes = bee.$input.find('.typebox');
            setTimeout(function() {
                for(let j=0; j<parts.length; j++) { // bounce every box whose pair is the in-focus one
                    if(parts[j].toLowerCase()+'/'+phonemes[j] === wc) {
                        $boxes.filter('[data-seg="'+j+'"]').addClass('seg_focus_bounce');
                    }
                }
                // The CSS bounce (~.5s) runs alongside the phoneme; a short pause then the reward.
                play_phoneme(phoneme, function() { setTimeout(done, 750); });
            }, 750);
        }


        // Render a segmented word: non-typed text (to_display/mask) plus one box per part, filling
        // as the child types; a completed part's box is green (ok) or red (mistake).
        function render_segmented_input() {
            const s = bee.processed_word.to_display;
            const mask = bee.processed_word.mask;
            const to_type = bee.processed_word.to_type;
            const parts = bee.processed_word.add_words;
            const phonemes = bee.processed_word.phonemes;
            const boundaries = bee.processed_word.boundaries; // true => draw a morpheme divider before this box

            // A part is "in focus" if its grapheme/phoneme is the group's taught pair. word_class is
            // built as grapheme+'/'+phoneme in the class derivation; 'noclass' has no '/'.
            const focus_pair = (bee.problem && bee.problem.word_class) || '';
            const is_focus_part = function(ix) {
                return focus_pair.indexOf('/') >= 0 && parts[ix].toLowerCase()+'/'+phonemes[ix] === focus_pair;
            };

            // Box width in characters: normally uniform (sized to the longest part) so it leaks no
            // length clue; a long series switches to compact mode sized to real lengths (below).
            let max_part_len = 0;
            let total_chars = 0;   // characters to render across all boxes
            let has_two_char = false; // is any segment exactly 2 characters?
            for(let i=0; i<parts.length; i++) {
                const len = parts[i].length;
                if(len > max_part_len) { max_part_len = len; }
                total_chars += len;
                if(len == 2) { has_two_char = true; }
            }
            // Proxy for the on-screen length of the box series: the characters in the boxes plus the
            // gaps between adjacent boxes (one per segment boundary, i.e. segments - 1).
            const box_series_len = total_chars + (parts.length - 1);
            // box_char_len(len) -> character widths to render a box holding a `len`-character segment
            let box_char_len;
            if(box_series_len < bee.max_box_len) {
                // Enough room: uniform boxes sized to the longest part (no length clue)
                box_char_len = function(len) { return max_part_len; };
            } else {
                // Compact: size boxes to real length, but render 1-char boxes at 2 chars when any
                // 2-char segment exists (so they don't stand out).
                const one_char_len = has_two_char ? 2 : 1;
                box_char_len = function(len) { return len == 1 ? one_char_len : len; };
            }

            let o = '';
            let type_ix = 0;    // index into to_type / the current typed position
            let part_ix = 0;    // index into parts
            let part_start = 0; // to_type index where the current part begins
            for(let i=0; i<s.length; i++) {
                if(mask[i] == '*') { // non-typed text around the parts
                    o += esc_html(s[i]);
                    continue;
                }
                if(i == 0 || mask[i-1] == '*') { // just entered to-type area
                    o += '<span class="typebox_wrap">';
                }
                if(type_ix == part_start) { // open a box at each part start; colour it once the part is completed
                    if(boundaries[part_ix]) { o += '<span class="morph_bar" aria-hidden="true"></span>'; } // morpheme divider before this box
                    const st = segment_status(part_start, parts[part_ix].length);
                    const boxstyle = ' style="min-width:'+(box_char_len(parts[part_ix].length)*1.2)+'ch"';
                    o += '<span class="typebox'+(st == 'ok' ? ' typebox_ok' : (st == 'error' ? ' typebox_err' : ''))+(is_focus_part(part_ix) ? ' typebox_focus' : '')+'" data-seg="'+part_ix+'"'+boxstyle+'>';
                }
                if(type_ix == bee.typed.length) { o += '<span class="cursor_outer"><span class="cursor"></span></span>'; }
                if(type_ix < bee.typed.length) { // already typed (no per-character underline - the box colour shows errors)
                    const userchar = bee.typed[type_ix];
                    o += (userchar == ' ' ? '&nbsp;' : esc_html(userchar));
                }
                if(type_ix == part_start + parts[part_ix].length - 1) { // close the box at the end of the part
                    o += '</span>';
                    part_ix++;
                    part_start = type_ix + 1;
                }
                if(i == s.length - 1 || mask[i+1] == '*') {
                    o += '</span>'; // close .typebox_wrap
                }
                type_ix++;
            }
            return o;
        }


        // Draw the split-digraph link line(s): a '/X' segment is a silent "e" lengthening the vowel
        // two boxes to its left. Once that vowel box is correct, draw a rounded half-box joining the
        // two, measured centre-to-centre off the DOM rects. Rebuilt after each input re-render.
        function draw_segment_connectors() {
            const connectors = bee.processed_word.connectors;
            if(!connectors || connectors.indexOf(true) < 0) { return; } // nothing to link
            const parts = bee.processed_word.add_words;
            const $boxes = bee.$input.find('.typebox');
            if($boxes.length != parts.length) { return; } // render/parts mismatch: skip rather than mis-draw
            const base = bee.$input.get(0).getBoundingClientRect();
            if(!base.width) { return; } // input not laid out (hidden) - nothing to measure
            const prog = parts_progress();
            for(let i=2; i<connectors.length; i++) {
                if(!connectors[i]) { continue; }
                const vowel_ix = i - 2; // the vowel box the silent "e" lengthens (one box between)
                if(segment_status(prog.starts[vowel_ix], parts[vowel_ix].length) != 'ok') { continue; } // wait until the vowel is right
                const a = $boxes.get(vowel_ix).getBoundingClientRect(); // vowel box
                const c = $boxes.get(i).getBoundingClientRect();        // silent-e box
                const a_mid = (a.left - base.left) + a.width / 2;       // horizontal centre of the vowel box
                const c_mid = (c.left - base.left) + c.width / 2;       // horizontal centre of the silent-e box
                bee.$input.append($('<span class="segbox_link"></span>').css({
                    left:  (a_mid - 1) + 'px',                 // -1 centres the 2px arm on the box mid-line
                    top:   (a.bottom - base.top - 1) + 'px',   // start just under the box bottoms
                    width: (c_mid - a_mid + 2) + 'px'          // centre-to-centre, +2 for the two arm widths
                }));
            }
        }



        // Render a typed input into HTML. prefix=what is typed, s=full string
        function render_to_html(for_help) {
            if(bee.processed_word.is_segmented && !for_help) { return render_segmented_input(); }
            const line_length = 15; // word wrap after this many characters (for non-stories)

            const s = bee.processed_word.to_display;

            // Determine line breaks
            // The aim is to leave the underscores in place, so we word wrap according to the target string
            // With a story, wrap_at stays empty and so there is no forced wrapping
            const wrap_at = {};
            if(!bee.processed_word.is_story) {
                let cur_line = 0;
                for(let i=0; i<s.length; i++) {
                    cur_line++;
                    if(cur_line >= line_length) {
                        wrap_at[i] = 'forced';
                        cur_line = 0;
                        continue;
                    }
                    if(s[i] == ' ') {
                        let is_full = true;
                        for(let j=1; j<=line_length-cur_line; j++) { // lookahead
                            // console.log("ij", i, j, cur_line);
                            if(i+j >= s.length || s[i+j] == ' ') { 
                                is_full = false; 
                                break; 
                            }
                        }
                        if(is_full) {
                            wrap_at[i] = 'at space';
                            cur_line = 0;
                        }
                    }
                }
            }
            // console.log(wrap_at);
            
            let o = '';
            let typed_ix = 0;
            for(let i=0; i<s.length; i++) {
                const totype = (bee.processed_word.mask === false || bee.processed_word.mask[i] == '_'); // whether the character is to be typed
                
                if(for_help) { // We are rendering the help string
                
                    if(totype) { // We are in the area that should be typed
                        o += '<span class="help_totype">';
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        o += '</span>';
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                    }
                    if(wrap_at[i]) { o += '<br>'; }
                    
                } else { // We are rendering the input field
                
                    if(totype) { // We are in the area that should be typed
                        if(typed_ix < bee.typed.length) { // The user typed this much
                            const userchar = bee.typed[typed_ix];
                            const wrongchar = (s[i].toLowerCase() != userchar.toLowerCase());
                            if(wrongchar) { o += '<span class="wrongchar">'; }

                            if(userchar == ' ') {
                                if((!bee.processed_word.is_story) || wrongchar) { o += '&nbsp;'; } else { o += ' '; }
                            } else {
                                o += esc_html(userchar);
                            }
                            if(wrongchar) { o += '</span>'; }
                            if(wrap_at[i]) { o += '<br>'; }
                        } else { // The user is still to type this
                            if(typed_ix == bee.typed.length) { 
                                o += '<span class="cursor_outer"><span class="cursor"></span></span>';
                            } 
                            if(bee.processed_word.is_story) {
                                o += '<span class="story_totype">'+esc_html(s[i])+'</span>';
                            } else {
                                o += (s[i] == ' ' ? '<span class="spacehelp">_</span>' : '_');
                            }
                            if(wrap_at[i]) { o += '<br>'; }
                        }
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                
                }
            }
            return o;
        }

        // Mark a word as known, and count how many times it was successfully entered
        // A word is known if it could be typed without help
        function add_known_word() {
            data_migration();
            const pstore = bee.storage.players[bee.player];
            
            const word = bee.processed_word.to_type;
            if(!pstore.known_words) { pstore.known_words = {}; }
            if(pstore.known_words[word] === undefined) { pstore.known_words[word] = 1; } else { pstore.known_words[word]++; }
            save_storage('add_known_word');
        }
        
        
        function reset_known_words() {
            const pstore = bee.storage.players[bee.player];
            if(pstore.known_words) { pstore.known_words = {}; }
            if(pstore.pair_stats) { pstore.pair_stats = {}; }
            save_storage('reset_known_words');
            bee_alert('List of known words reset');
        }
        
        
        // Return the count of successful entries of a word, keyed on its to_type string
        // (the same key add_known_word writes).
        function is_known_word(word_ix) {
            const kw = bee.storage.players[bee.player].known_words;
            if(!kw) { return 0; }
            const key = bee.words[word_ix].proc_cache.to_type;
            const c = kw[key];
            return c === undefined ? 0 : c;
        }


        // ---- Per-pair coverage stats (pstore.pair_stats) ----
        // Keyed by "grapheme/phoneme". Six counters per pair:
        //   [0]/[1] successes/asks while IN FOCUS (purple '?', produced unaided)
        //   [2]/[3] successes/asks while not in focus and NOT shown in the bank (obvious/predictable)
        //   [4]/[5] successes/asks while not in focus and initially shown in the bank (revealed)
        // Only [0]/[1] drive class selection; the rest are collected for future use / validation.
        function pair_stat(cls) {
            const ps = bee.storage.players[bee.player].pair_stats;
            if(!ps[cls]) { ps[cls] = [0, 0, 0, 0, 0, 0]; }
            return ps[cls];
        }


        // Play the mp3 assigned to a word or use TTS
        function play_word(text, callback, max_timeout) {
            const s = (text === undefined ? bee.processed_word.to_display : text);
            
            const file_base = s.toLowerCase().replaceAll(/ /g, '_').replaceAll(/[^a-z_]/g, '');
            const file = 'assets/sounds/words/'+file_base+'.mp3';
            
            check_url(file, function(file_exists) {
                if(file_exists) { // play mp3
                    if(max_timeout === undefined) { max_timeout = bee_tts.speaking_time(s) * 1.7; }
                    _play_obj({object: false, file: file, volume: 1}, callback, max_timeout);
                }
                else { // use TTS
                    bee_tts.speak(s, callback);
                }
            });
            
        }
        
        
        function highlight_key(selector) {
            const $keyelem = $(selector);
            const kclass = 'kbactive';
            $keyelem.addClass(kclass);

        function process_typing(group, key_distances, is_direct) {
            if(group == 'TYPING') {
                if(!bee.can_type) { 
                    playme('notavail');
                    return; 
                }
                
                let typed_key = undefined;
                if(is_direct) {
                    typed_key = key_distances;
                } else {
                    // Check if the user could have meant the next correct character
                    if(bee.typed.length < bee.processed_word.to_type.length) {
                        const desired_char = bee.processed_word.to_type[bee.typed.length];
                        for(let i=0; i<key_distances.length; i++) {
                            if(key_distances[i][1] < .6 /* ratio to key width */ && key_distances[i][0].toLowerCase() == desired_char.toLowerCase()) {
                                typed_key = desired_char; break;
                            }
                        }
                    }
                    if(typed_key === undefined) { 
                        if(key_distances[0][1] > .5) { return; }
                        typed_key = key_distances[0][0];
                    }
                }
                
                if(typed_key == 'BACKSPACE') {
                    if(bee.typed.length > 0) {
                        bee.typed = bee.typed.substring(0, bee.typed.length-1);
                        update_input_field();
                        bee.backspace_used++;
                        // Coverage stats: a backspace into a segment means it was not a clean first
                        // attempt - lock the segment now holding the cursor so it cannot score.
                        if(bee.processed_word.is_segmented) {
                            const parts = bee.processed_word.add_words;
                            let acc = 0;
                            for(let k=0; k<parts.length; k++) { acc += parts[k].length; if(bee.typed.length < acc) { bee.seg_locked[k] = true; break; } }
                        }
                        highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    }
                    return;
                }

                if(typed_key == 'HELP') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(bee.processed_word.is_segmented) {
                        // Switch the word bank to full mode: every segment a plain tile (see
                        // render_addwords). The in-focus box keeps its purple border. Idempotent once full.
                        if(bee.help_full_bar) { playme('notavail'); return; }
                        bee.help_full_bar = true;
                        bee.help_asked++;
                        $('.prompt .addwords').html(render_addwords()).show();
                        update_completed_chips(); // grey chips of already-completed parts in the new bank
                        return;
                    }
                    if(!bee.can_use_help) { playme('notavail'); return; }
                    show_help(false);
                    return;
                }
                if(typed_key == 'PLAY_WORD') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(bee.processed_word.is_story) { return; }
                    play_word();
                    return;
                }
                
                if(bee.typed.length < bee.processed_word.to_type.length) {
                    
                    // If we're in a story, check if we have just finished a word to type
                    let story_word_boundary = false;
                    let addwords_cumulative = '';
                    let addwords_last = -1;
                    if(bee.processed_word.is_story) {
                        for(let i=0; i<bee.processed_word.add_words.length - 1; i++) {
                            addwords_cumulative += bee.processed_word.add_words[i];
                            addwords_last = i;
                            if(addwords_cumulative.length > bee.typed.length) { break; }
                            if(addwords_cumulative.toLowerCase() == bee.typed.toLowerCase()) {
                                story_word_boundary = true;
                                addwords_cumulative += bee.processed_word.add_words[i+1]; // store the next goal to check after adding the typed character
                                addwords_last = i+1;
                                break;
                            }
                        }
                    }
                
                    // Segmented: how many parts were complete before this keystroke
                    const seg_completed_before = bee.processed_word.is_segmented ? parts_progress().completed : 0;

                    if(story_word_boundary && typed_key == ' ') {
                        console.log("Skipping space at story word boundary");
                    } else {
                        bee.typed += typed_key;
                        if(bee.processed_word.is_story && bee.typed.toLowerCase() == addwords_cumulative.toLowerCase()) {
                            console.log("Story word completed");
                            if(bee.typed.length < bee.processed_word.to_type.length) {
                                const word_to_play = bee.processed_word.add_words[addwords_last];
                                console.log("Speaking story word", word_to_play);
                                play_word(word_to_play, undefined, undefined); /* text, callback, max_timeout */
                            }
                        }
                        if(bee.processed_word.is_segmented) {
                            // A keystroke fills at most one part; voice its phoneme only if that part
                            // is correct (never a wrong entry). The final part is voiced too.
                            const seg_prog = parts_progress();
                            const seg_completed = seg_prog.completed;
                            const done_ix = seg_completed - 1;
                            if(seg_completed > seg_completed_before && segment_status(seg_prog.starts[done_ix], bee.processed_word.add_words[done_ix].length) == 'ok') {
                                speak_completed_part(bee.processed_word.add_words[done_ix], bee.processed_word.phonemes[done_ix]);
                                // Coverage stats: a clean first-attempt segment (no help, no in-segment
                                // backspace, not a repeat, not already counted) is a success for its pair.
                                if(!bee.problem.is_repeat && bee.help_asked === 0
                                   && !bee.seg_locked[done_ix] && bee.seg_class[done_ix]) {
                                    const num_ix = {'focus':0, 'obvious':2, 'revealed':4};
                                    const pair = bee.processed_word.add_words[done_ix].toLowerCase()+'/'+bee.processed_word.phonemes[done_ix];
                                    pair_stat(pair)[num_ix[bee.seg_class[done_ix]]]++;
                                    bee.seg_locked[done_ix] = true;
                                }
                            }
                        }
                    }
                    update_input_field();
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key.toLowerCase()+'"]');
                    
                    if(bee.typed.toLowerCase() == bee.processed_word.to_type.toLowerCase()) { // Success!
                        disable_typing();
                        bee.$input.addClass('success');
                        
                        // Reschedule (ASK) only when the child used help (the segmented reveal-bank
                        // HELP key, or a plain word's reveal - both bump help_asked) or over-corrected;
                        // a clean solve is marked known, the rest just advance. A repeat never
                        // reschedules again.
                        let outcome = 'UNSURE';
                        if(bee.problem.is_repeat) {
                            outcome = 'OK';
                        } else if(bee.help_asked > 0) {
                            outcome = 'ASK';
                        } else if(bee.processed_word.is_segmented) {
                            // Reschedule if backspaces exceed a third of the segment count
                            const num_segments = bee.processed_word.add_words.length;
                            if(bee.backspace_used > num_segments/3) { outcome = 'ASK'; }
                            else if(bee.backspace_used <= 1) { outcome = 'ADD_KNOWN'; }
                            else { outcome = 'OK'; }
                        } else if(bee.processed_word.is_story) {
                            if(bee.backspace_used <= 2) { outcome = 'ADD_KNOWN'; }
                            else if(bee.backspace_used <= 3) { outcome = 'OK'; }
                            else { outcome = 'ASK'; }
                        } else { // plain word
                            if(bee.backspace_used <= 1) { outcome = 'ADD_KNOWN'; }
                            else if(bee.backspace_used <= 2) { outcome = 'OK'; }
                            else { outcome = 'ASK'; }
                        }
                        console.log('success help=', bee.help_asked, 'backspace=', bee.backspace_used, 'outcome=', outcome);
                        
                        if(outcome == 'ADD_KNOWN') {
                            queue_success();
                            add_known_word();
                        } else if(outcome == 'ASK') {
                            reschedule_question(bee.problem);
                        } else { // 'OK'
                            queue_success();
                        }
                        
                        /* 
                        call_local_hook('success_hook', [bee.problem.word_ix, bee.words[bee.problem.word_ix].text, bee.player, bee.help_asked, -1]);
                        */

                        const on_success = function() {
                            success_common({'skip_this_score':bee.problem.is_repeat});
                        };

                        // Story / segmented: re-read the whole text before advancing (req 6)
                        const re_read = (bee.processed_word.is_story || bee.processed_word.is_segmented);
                        if(bee.processed_word.is_segmented) {
                            // The final part's phoneme was just voiced; pause ~1s to let it finish,
                            // then re-read the whole word, refocus the in-focus pair (bounce + its
                            // phoneme) apart from the reward, then the success actions.
                            setTimeout(function() {
                                play_word(undefined, function() { segmented_focus_refocus(on_success); }, undefined);
                            }, 1000);
                        } else if(re_read) { play_word(undefined, on_success, undefined); } else { on_success(); }
                    }
                }
                return;
            }
        }
