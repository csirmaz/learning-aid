    <style>
        body { margin: .5rem 0; }
        .container { padding: 0; }
        .prompt { padding-top: 0; }
    
        .prompt .img {
            font-family: Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,Android Emoji,EmojiSymbols,EmojiOne Mozilla,Twemoji Mozilla,Segoe UI Symbol,Noto Color Emoji,EmojiOne Color,emoji;
            display: inline-block;
            font-size: 3rem;
            text-align: center;
            background: #fff;
            border-radius: 1rem;
            height: 5rem;
            line-height: 5rem;
            width: 5rem;
        }
        .prompt .img img {
            min-height: 3rem;
            max-height: 4rem;
            max-width: 4rem;
            vertical-align: -0.5rem;
            image-rendering: pixelated;
        }
        
        .prompt .infield {
            display: block;
            background: #fffae4;
            margin: 1rem 0;
            font-size: 2rem;
            line-height: 2.5rem;
            padding: 1rem;
            min-width: 20rem;
            min-height: 7rem;
            letter-spacing: .18rem;
        }
        
        body .prompt .infield.infield_story,
        .prompt .addwords {
            font-size: 1rem;
            line-height: 1.6rem;
            padding: .5rem;
            letter-spacing: .08rem;
            border-radius: 0;
        }
        body .prompt .infield.infield_story {
            padding-bottom: 0;
        }
        .prompt .addwords {
            background: #fffae4;
            padding: 0.5rem;
        }
        .prompt .addwords .word {
            display: inline-block;
            border: 1px solid #05b;
            color: #05b;
            border-radius: .5rem;
            margin: 0 .5rem;
            padding: 0 .5rem;
        }
        
        .prompt .infield .help,
        .prompt .infield .inp {
            display: inline-block;
        }
        
        .prompt .infield .help .help_totype,
        .prompt .infield_story .story_totype,
        .prompt .infield .reveal_totype {
            background: #fff; /* #fffaf0; */ /* must match .prompt .infield_story .story_totype color */
            text-decoration: underline solid rgba(119,238,0,.6) .2rem;
            text-underline-offset: .6rem;
        }

        .prompt .infield .help { color: #05b; }
        .prompt .infield .help .help_totype.help_classhighlight { color: #b38; }
        .prompt .infield_story .story_totype { text-underline-offset: .3rem; color: #fff; /* #fffaf0; */ }
        .prompt .infield .reveal_totype      { color: #ccc; }
        .prompt .infield .reveal_totype.help_classhighlight { color: #fac; }
        .prompt .infield_story .reveal_totype  { text-underline-offset: .3rem; }
        
        .prompt .infield .inp { color: #000; }
        .prompt .infield .inp .spacehelp { color: #ccc; }
        body .prompt .infield .success { color: #090; }
        body .prompt .infield .success .typed_classhighlight { color: #b38; }
        .prompt .infield .helpwait { display: none; }

        /* Segmented (phoneme / morpheme) question type: parts typed into boxes */
        body .prompt .infield.infield_segmented {
            font-size: 1.2rem;
            line-height: 2.5rem;
            letter-spacing: .12rem;
            overflow-x: auto;
        }
        .prompt .infield_segmented .typebox_wrap { white-space: nowrap; }
        .prompt .infield_segmented .typebox {
            display: inline-block;
            /* content-box so min-width/min-height are the content area: an empty box already
               reserves room for its part (see render_segmented_input) and a full line box, so it
               does not grow (in either direction) when the child starts typing */
            box-sizing: content-box;
            min-width: 1.5rem;   /* overridden inline per box; see render_segmented_input for the width */
            min-height: 2rem;    /* = line-height, so a typed line box fits without enlarging the box */
            line-height: 2rem;
            margin: 0 .15rem;
            padding: .1rem .3rem;
            border: 2px solid #05b;
            border-radius: .4rem;
            text-align: left;
            vertical-align: middle;
            background: #fff;
        }
        /* A completed segment turns green (all correct) or red (a mistake somewhere) */
        .prompt .infield_segmented .typebox.typebox_ok  { background: #e2f5d9; border-color: #3a3; }
        .prompt .infield_segmented .typebox.typebox_err { background: #f6d2d2; border-color: #c33; }
        /* Drop the green underline under the revealed answer inside the boxes (keep the grey text) */
        .prompt .infield_segmented .reveal_totype { text-decoration: none; }
        .prompt .addwords .word.done { color: #ccc; border-color: #ddd; }
        /* Split-digraph link ('/X' segment): a rounded "bottom half of a box" joining a tensed
           vowel box to its silent-e box under the single box between them. Drawn once the vowel box
           is completed correctly, so it is coloured the same green as a correct (typebox_ok)
           segment's border and runs centre-to-centre between the two boxes (see
           draw_segment_connectors(), which positions it absolutely inside .inp). */
        .prompt .infield_segmented .inp { position: relative; }
        .prompt .infield_segmented .segbox_link {
            position: absolute;
            height: .6rem;               /* how far the link drops below the boxes */
            border: 2px solid #3a3;       /* matches the correct (typebox_ok) segment border */
            border-top: none;             /* bottom half of a box only */
            border-bottom-left-radius: .4rem;
            border-bottom-right-radius: .4rem;
            box-sizing: border-box;
            pointer-events: none;
        }

        @keyframes blink-animation { to { visibility: hidden; } }
        
        .cursor_outer { position: relative; }
        .cursor {
            animation: blink-animation 2s steps(2, start) infinite;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            border: 2px solid #f00;
            width: .2rem;
            height: 1.5rem;
            margin-left: -1px;
            border-right: 0 solid transparent;
        }
        .aged-paper .cursor { border: 2px solid #000; }
        .infield_story .cursor { height: 1.2rem; width: .1rem; }
        .infield .help .cursor { visibility: hidden; }
        
        .wrongchar { text-decoration: underline dotted #05b .2rem; text-underline-offset: .6rem; }
        .infield_story .wrongchar { text-underline-offset: .3rem; }

        .kbdiv { 
            min-width: 23rem;
            margin: 1rem 0.2rem;
        }
        .kbrow0 { text-align: right; }
        .kbrow1 { margin-left: .2rem; }
        .kbrow2 { margin-left: .4rem; }
        .kbrow3 { margin-left: 1.4rem; }
        .kbrow4 { margin-left: 5rem; }
        
        .kbdiv .kbkey {
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            /* background: #b38; */
            background: #444;
            text-shadow: 0 0 .2rem black;
            transition: color 0.3s ease;
            color: #fff;
            width: 2.1rem;
            height: 3rem;
            border-radius: .5rem;
            margin: .1rem;
            text-align: center;
            line-height: 3rem;
        }
        .kbdiv .kbspace { width: 11rem; /* background:#309; */ margin-right: 2.5rem; }
        .kbdiv .kbbksp { width: 4rem; /* background:#b22; */ color: #e00; font-size: 150%; }
        .kbdiv .kbhelp { background: #999; }
        .kbdiv .kbkey[data-key="'"] { /* background:#309; */ }
        .kbdiv .kbkey[data-key="a"],
        .kbdiv .kbkey[data-key="e"],
        .kbdiv .kbkey[data-key="i"],
        .kbdiv .kbkey[data-key="o"],
        .kbdiv .kbkey[data-key="u"] { /* background: #3b2; */ color: #7e0; }
        .kbdiv .kbkey[data-key="y"],
        .kbdiv .kbkey[data-key="w"] { /* background: #ca2; */ color: #e90; }
        
        .kbdiv .kbkey.kbactive {
            /* box-shadow: 0 0 .8rem black inset; */
            box-shadow: 0 0 .8rem #ccc inset;
            outline: .3rem solid #e90;
        }
        body .kbdiv.kbdisabled .kbkey { color: rgba(255,255,255,0.7); }

    <script>

        // Words, split into sets
        /*
            Object properties:
            - level (int)
            - emoji (str) optional
            - ref (str) optional (for referenced emojis)
            - text (str)
            
            Text:
            - word to spell
            - text with <> around parts to type
            
            - We will attempt to play assets/sounds/words/<word to spell>.mp3 (lowercased and spaces replaced by underscores) or use TTS
            - If there are multiple regions to type, we use a "story" format question
        */
        // Use e.g. https://getemoji.com/
        // Use e.g. https://ttsmp3.com/ to generate TTS
        
        // Valid phonics class tags. A class tag groups words that share an orthographic
        // pattern (see class_to_ix in init_wordlist_impl). This set is the registry of known
        // tags: a tag missing from it is reported by init_wordlist_impl as an unknown / typo tag.
        const known_class_tags = {
            "e/e": 1, "i/I": 1, "y/I": 1, "o/o": 1, "u/A": 1, "a/ae": 1, "lax:dbl": 1,
            "ee/i:": 1, "oo/u:": 1, "oo/U": 1, "ai/eI": 1, "ay/eI": 1, "ow/aU": 1,
            "ow/EU": 1, "oi/OI": 1, "oy/OI": 1, "ou/aU": 1, "oa/EU": 1, "ea/i:": 1,
            "ea/e": 1, "ew/u:": 1, "aw/O:": 1, "igh/aI": 1, "end:y@": 1, "er/Er": 1,
            "end:ie": 1, "end:et": 1, "end:ot": 1, "end:al@": 1, "end:le": 1, "end:ly": 1,
            "a/eI": 1, "a/a:": 1, "e/i:": 1, "i/aI": 1, "y/aI": 1, "o/EU": 1, "u/u:": 1,
            "dark:al": 1, "dark:ol": 1, "or/O:": 1, "ar/a:": 1, "ir/3:": 1, "or/3:": 1,
            "ur/3:": 1, "ea/IE": 1, "ai/eE": 1, "er/3:": 1, "o/E": 1, "a/E": 1, "g/dZ": 1,
            "cons:th": 1, "ph/f": 1, "ck/k": 1, "wh/w": 1, "c/s": 1, "kn/n": 1, "wr/r": 1,
            "ch/S": 1, "ch/tS": 1, "ti/S": 1, "tur/tS": 1, "common": 1, "tricky": 1,
            "calendar": 1, "dge/dZ": 1, "au/O:": 1, "end:ey": 1, "noclass:": 1
        };

        // Phonemes we can voice in a segmented word, keyed by an ascii id, with a short
        // explanation of the sound. (More will be added later as we cover the missing phonemes.)
        // Valid phoneme ids for segmented words. Every value is 1 - the object is only used as a
        // set (does this id exist?); the IPA / example for each id is in its line comment.
        // 'x' = silent, 'ks' is a cluster, 'SEn'/'Id' are whole-morpheme pseudo-phonemes.
        const phoneme_sounds = {
            'x': 1,     // silent - no sound (e.g. the "e" of a split digraph). The capital-'X' spec
                        //          '/X' is the same silent sound but also draws a split-digraph link
                        //          (see get_processed_word / draw_segment_connectors); it is folded to
                        //          'x' here, so 'X' itself is not a phoneme id.
            // Consonants
            'b': 1,     // /b/ as in "bat"
            'd': 1,     // /d/ as in "dog"
            'f': 1,     // /f/ as in "fan" (also the sound of "ph")
            'g': 1,     // /g/ as in "goat"
            'h': 1,     // /h/ as in "hat"
            'k': 1,     // /k/ as in "kit" (also the sound of "c")
            'l': 1,     // /l/ as in "leg"
            'm': 1,     // /m/ as in "map"
            'n': 1,     // /n/ as in "net"
            'ng': 1,    // /ŋ/ as in "sing"
            'p': 1,     // /p/ as in "pen"
            'r': 1,     // /r/ as in "run"
            's': 1,     // /s/ as in "sun"
            't': 1,     // /t/ as in "top"
            'v': 1,     // /v/ as in "van"
            'z': 1,     // /z/ as in "zip"
            'S': 1,     // /ʃ/ as in "she"
            'ks': 1,    // /ks/ as in "excellent"
            'dZ': 1,    // /dʒ/ as in "George"
            'tS': 1,    // /tʃ/ as in "church"
            'ts': 1,    // /ts/
            'T': 1,     // /θ/ as in "thin"
            'D': 1,     // /ð/ as in "this"
            'Z': 1,     // /ʒ/ as in "vision"
            //
            'j': 1,     // /j/ as in "you"
            'w': 1,     // /w/ as in "wet"
            'sl': 1,    // syllabic l
            // Short (lax) vowels
            'ae': 1,    // /æ/ as in "cat"
            'A': 1,     // /ʌ/ as in "cup"
            'o': 1,     // /ɒ/ as in "hot"
            'E': 1,     // /ə/ schwa, as in "about"
            'Er': 1,    // /ə/ (r-coloured /ɚ/ in rhotic accents) the "-er" ending, as in "teacher"
            'e': 1,     // /e/ short "e" as in "pen"
            'I': 1,     // /ɪ/ lax (short) "i" as in "fish"
            'U': 1,     // /ʊ/ as in "put"
            // Long (tense) vowels
            'i:': 1,    // /iː/ as in "see"
            'u:': 1,    // /uː/ as in "food"
            'a:': 1,    // /ɑː/ as in "car"
            'O:': 1,    // /ɔː/ as in "corn"
            '3:': 1,    // /ɜː/ as in "nurse"
            // Diphthongs
            'aI': 1,    // /aɪ/ as in "eye"
            'eI': 1,    // /eɪ/ as in "day"
            'EU': 1,    // /əʊ/ as in "road"
            'OI': 1,    // /ɔɪ/ as in "coin"
            'aU': 1,    // /aʊ/ as in "cow"
            'IE': 1,    // /ɪə/ as in "ear"
            'eE': 1,    // /eə/ as in "air"
            'UE': 1,    // /ʊə/ as in "cure"
            // Triphthongs
            'aIE': 1,    // /aɪə/ as in "fire"            
            // Pseudo-phonemes: a whole morpheme treated as one segment
            'Iz': 1,    // one value of the plural / 3rd person morpheme, /ɪz/
            'kw': 1,    // usual value of "q", /kw/
            'ju:': 1,   // /ju:/
            'Ing': 1,   // "-ing" morpheme, /ɪŋ/
            'En': 1,    // /ən/
            'Et': 1,    // "-et" ending, /ɪt/ or /ət/
            'SEn': 1,   // "-tion" ending, /ʃən/
            'Id': 1,    // one value of the past tense morpheme, "-ed" ending, /ɪd/
            'lI': 1,    // value of -ly morpheme, /lɪ/
            'ItI': 1,   // value of -ity /ɪtɪ/
            'Ent': 1,   // value of -ant /ənt/
            'IdZ': 1,   // value of -age /ɪdʒ/
            'tSE': 1,   // value of -ture /tʃə/
            'In': 1,    // value of in- /ɪn/
            'kEn': 1,   // value of con- /kən/
            'dI': 1,    // value of de- /dɪ/
        };

        // Default ascii phoneme (a key of phoneme_sounds) for a segment's grapheme when none is
        // given after a '/'. Looked up case-insensitively (see default_phoneme()).
        const segment_default_phoneme = {
            'b': 'b', 
            'bb': 'b',
            'd': 'd', 
            'dd': 'd',
            'f': 'f', 
            'ff': 'f',
            'g': 'g', 
            'gg': 'g',
            'h': 'h', 
            'k': 'k',
            'l': 'l', 
            'll': 'l',
            'm': 'm', 
            'mm': 'm',
            'n': 'n', 
            'nn': 'n',
            'ng': 'ng',
            'p': 'p', 
            'pp': 'p',
            'r': 'r', 
            'rr': 'r',
            't': 't',
            'tt': 't',
            'v': 'v', 
            'w': 'w', 
            'x': 'ks',
            'z': 'z',
            'c': 'k',   // "c" voiced as /k/
            'ck': 'k',
            'ph': 'f',  // "ph" voiced as /f/
            's': 's',
            'ss': 's',
            'sh': 'S',
            'ch': 'tS',
            'tch': 'tS',

            'a': 'ae',
            'e': 'e',
            'y': 'I',
            'i': 'I',    // "i" voiced as lax /ɪ/
            'u': 'U',

            'oo': 'u:',
            'ai': 'eI',
            'ay': 'eI',
            'ee': 'i:',
            'ea': 'i:',
            'oi': 'OI',
            'oy': 'OI',
            'ew': 'u:',
            
            'ar': 'a:',
            'er': 'Er',
            'or': 'O:',
            'ir': '3:',
            'ur': '3:',
            'ire': 'aIE',
            'ear': 'IE',

            'igh': 'aI',
            'tion': 'SEn',
            'ed': 'Id',
            'et': 'Et',
            'ing': 'Ing',
            'is': 'Iz',
            'ly': 'lI',
            'ture': 'tSE',
        };

        // Default ascii phoneme for a grapheme, or '' if we have not mapped it yet.
        function default_phoneme(grapheme) {
            const ph = segment_default_phoneme[grapheme.toLowerCase()];
            return (ph === undefined ? '' : ph);
        }

        const MIN_LONGSTORY_LEVEL = 100;
        
        // For the format, see process_word_data()
        // [WORDS START]
        const word_repository = [
        
// level >= MIN_LONGSTORY_LEVEL = 100 represent long-format stories
// Each story is a series of "words" (typing questions) identified by having the same level number.
// They are asked consecutively.

// TODO Form regular typing problems from segmented ones by ignoring segments

"20|@🧑|a <y/j=ou/A=ng> man|tricky", // [young] reviewed
"20|@🛒|go to the <m=ar=k=et>|ar/a:,end:et", // [market] reviewed
"20|@🌲|the big <f=o/o=r=e/I=s=t>|o/o", // [forest] reviewed
"20|@🧵|a piece of <c=l=o/o=th/T>|cons:th", // [cloth] reviewed
"20|@🦶|He set out on <f=oo/U=t>|oo/U", // [foot] reviewed
"20||He got <r=ea/i:=l=ly> hungry|end:ly,ea/i:", // [really] reviewed
"20|@🚶|He <w=al/O:=k=ed/t> until midday|dark:al", // [walked] reviewed
"20|@🍽️|eating <l=u/A=n=ch>|ch/tS", // [lunch] reviewed
"20|@🌑|The sky got <d=ar=k=er/Er>|ar/a:", // [darker] reviewed
"20|@📏|It was far in the <d=i=s=t=a/E=n=ce/s>|c/s", // [distance] reviewed
"20|@💡|A flickering <l=igh=t>|igh/aI", // [light] reviewed
"20|@💧|<w=a/O:=t=er/Er>|tricky,er/Er", // [water] reviewed
"20|@🪵|<w=oo/U=d=en/En> planks|oo/U", // [wooden] reviewed
"20|@🕐|<Wh/w=e=n> is your birthday?|wh/w", // [when] reviewed
"20||The walls <w=ere/3:> covered in moss|common", // [were] reviewed
"20|@🌻|<g=ar/a:=d=e/E=n>|ar/a:", // [garden] reviewed
"20|@🪟|The <w=i=n=d=ow/EU=s/z> were broken|ow/EU", // [windows] reviewed
"20|@❓|<Wh/w=a/o=t> do you need?|wh/w", // [what] reviewed

        function disable_typing() {
            if(bee.can_type) {

        }
        
        function enable_typing() {
            if(!bee.can_type) {
                bee.can_type = true;
                $('.kbdiv').removeClass('kbdisabled');
                $('.kbdiv .kbkey').removeClass('kbdisabledkey');
            }
        }

        // Initialize keyboard
        $(function() {
            
            const init_kb_row = function(cls, s) {
                let o = '';
                for(let i=0; i<s.length; i++) {
                    const k = s[i];
                    o += '<span class="kbkey" data-key="'+k.toLowerCase()+'">'+k+'</span>';
                }
                $('.'+cls).html(o);
            };
            
            init_kb_row('kbrow1', 'QWERTYUIOP');
            init_kb_row('kbrow2', 'ASDFGHJKL\'');
            init_kb_row('kbrow3', 'ZXCVBNM');
            
            let $all_keys = undefined;
            setTimeout(function() {
                $all_keys = $('.kbkey');
            }, 200);
            
            const mindist = function(a, b1, b2) {
                if(b1 <= a && a <= b2) { return 0; }
                return Math.min(Math.abs(a - b1), Math.abs(a - b2));
            };
            
            const tapdistance = function(ev, element, key_width) {
                const rect = element.getBoundingClientRect();
                const d1 = mindist(ev.pageX, rect.left, rect.right)/key_width;
                const d2 = mindist(ev.pageY, rect.top, rect.bottom)/key_width;
                if(d1 == 0) { return d2; }
                if(d2 == 0) { return d1; }
                return (d1 + d2);
            };
            
            $('.kbdiv').on('click', function(ev) {
                // Correct for mistaps. Get the top keys the user may have meant.
                const key_width = $all_keys[3].getBoundingClientRect().width;
                const measurements = [];
                for(let keyix=0; keyix<$all_keys.length; keyix++) {
                    const key = $all_keys[keyix];
                    const dist = tapdistance(ev, key, key_width);
                    measurements.push([$(key).data('key'), dist]);
                }
                const top4 = measurements.sort((a,b) => a[1]-b[1]).slice(0, 4);
                process_typing('TYPING', top4, false);
                return false;
            });
            
        });

        /* EXPLANATION OF TYPED, TO_TYPE, etc.
        
            word = 'This <is> very <good>.'
            bee.processed_word = {to_type: 'isgood', to_display: 'This is very good.', mask: '******__******____*'}
            
            bee.typed = 'ap'
            Display: "I eat ap___."
            
            Further properties
            emoji: str
            ref: str
            is_story: BOOL
            add_words: [str]  // if is_story

            SEGMENTED type: a word/sentence whose <..> parts are joined by '=', e.g.
            'They <m>=<e>=<n>=<tion>=<ed> my name'. The '=' is only a separator (never shown
            or typed). Sets is_segmented (instead of is_story); the ordered parts are add_words
            and the layout (surrounding text vs. the typed run) comes from to_display / mask.
        */

        // Extract the to_type string from a word entry
        function get_processed_word(word_ix) {
            const word_data = bee.words[word_ix];
            if(word_data.proc_cache !== undefined) {
                return word_data.proc_cache;
            }
            
            let to_type_str = '';
            let to_disp_str = '';
            let mask_str = '';
            const add_words = []; // words to type in a story / segments (parts) in a segmented word
            const phonemes = []; // parallel to add_words: ascii phoneme id to voice each segment (see phoneme_sounds)
            const connectors = []; // parallel to add_words: true if the segment draws a split-digraph link (see '/X' below)
            const full = word_data.text;
            // In the "segmented" type the <..> region holds '='-separated segments, e.g.
            // "blue <p=e=n>". A segment may give an explicit phoneme after a '/' (e.g.
            // "<p/p=e/e=n/n>", or "<m/m=a/eI=k=e/x>"); otherwise the default from
            // segment_default_phoneme is used. '=' and '/...' are separators/metadata: they are
            // never displayed or typed. (A plain word or story <..> with no '=' is one segment.)
            // The special spec '/X' is silent (like '/x') AND flags a split-digraph link: a silent
            // "e" that lengthens the vowel two boxes to its left (one consonant box between them),
            // e.g. "<h=o/EU=m=e/X>". It is folded to the silent phoneme 'x' with a connectors[] flag.
            const is_segmented = (full.indexOf('=') !== -1);
            let in_type = false;    // inside a <..> region
            let in_phoneme = false; // reading the phoneme id after a '/'
            let seg_grapheme = '';  // characters of the current segment (typed + displayed)
            let seg_phoneme = '';   // explicit phoneme id of the current segment, if any

            // Finish the current segment: record its grapheme and its (explicit or default) phoneme
            const flush_segment = function() {
                let ph = seg_phoneme.length ? seg_phoneme : default_phoneme(seg_grapheme);
                // '/X' = silent + split-digraph link: fold to the silent phoneme 'x' and record the
                // link so render draws a line back to the vowel box two boxes to the left.
                const has_link = (ph === 'X');
                if(has_link) { ph = 'x'; }
                add_words.push(seg_grapheme);
                phonemes.push(ph);
                connectors.push(has_link);
                // Flag segments whose phoneme is missing from the master list (a typo, or a
                // grapheme with no default and no explicit /phoneme yet)
                if(is_segmented && phoneme_sounds[ph] === undefined) {
                    console.error('Unknown phoneme', JSON.stringify(ph), 'for segment', JSON.stringify(seg_grapheme), 'in', JSON.stringify(full));
                }
                seg_grapheme = '';
                seg_phoneme = '';
                in_phoneme = false;
            };

            for(let i=0; i<full.length; i++) {
                const ch = full[i];
                if(!in_type) { // text around the <..> region
                    if(ch == '<') { in_type = true; seg_grapheme = ''; seg_phoneme = ''; in_phoneme = false; continue; }
                    to_disp_str += ch;
                    mask_str += '*';
                    continue;
                }
                // Inside a <..> region
                if(ch == '>') { flush_segment(); in_type = false; continue; }
                if(ch == '=') { flush_segment(); continue; } // segment separator
                if(ch == '/') { in_phoneme = true; continue; } // explicit phoneme id follows
                if(in_phoneme) { seg_phoneme += ch; continue; } // phoneme id char (metadata only)
                // Grapheme character: typed and displayed
                to_type_str += ch;
                to_disp_str += ch;
                seg_grapheme += ch;
                mask_str += '_';
            }

            if(add_words.length==0) { console.error('Nothing to type in', word_data); }

            const proc = {
                'to_type': to_type_str,
                'to_display': to_disp_str,
                'mask': mask_str,
                'is_story': (add_words.length > 1) && !is_segmented,
                'is_segmented': is_segmented,
                'emoji': word_data.emoji,
                'ref': word_data.ref,
                'imgref': word_data.imgref,
                'add_words': add_words,
                'phonemes': phonemes,
                'connectors': connectors,
                'level': word_data.level
            };
            word_data.proc_cache = proc;
            return proc;
        }
        
        
        // Render the word bank: the words to type in a story, or the parts of a segmented word
        // (both shuffled). update_completed_chips() greys the chips as parts are completed.
        function render_addwords() {
            let words = bee.processed_word.add_words.slice(); // clone
            shuffle(words); // WARNING changes array
            let o = '';
            for(let i=0; i<words.length; i++) {
                o += '<span class="word">'+words[i]+'</span>';
            }
            return o;
        }


        // ---- Multi-part words (stories and segmented) ----

        // Greedy mapping of bee.typed onto the ordered parts (add_words). A part counts as
        // finished as soon as enough characters have been typed to fill it - so on a segmented
        // "<p>=<r>=<o>=<ph>..." the first "p" advances to the next part (we assume the child is
        // typing the right thing), and in a story the count tracks completed words. Returns
        // {completed: number of parts fully typed, starts: [to_type index each part begins at]}
        function parts_progress() {
            const parts = bee.processed_word.add_words;
            const starts = [];
            let start = 0;
            let completed = 0;
            for(let i=0; i<parts.length; i++) {
                starts.push(start);
                if(bee.typed.length >= start + parts[i].length) { completed++; }
                start += parts[i].length;
            }
            return {'completed': completed, 'starts': starts};
        }

        // Status of a segment (part), given its start index in to_type and its length: 'pending'
        // (not fully typed yet), 'ok' (fully typed, all correct) or 'error' (fully typed with a
        // mistake). Used to colour the boxes and to decide whether to grey the chip.
        function segment_status(start, len) {
            if(bee.typed.length < start + len) { return 'pending'; }
            const to_type = bee.processed_word.to_type;
            for(let p=start; p<start+len; p++) {
                if(to_type[p].toLowerCase() != bee.typed[p].toLowerCase()) { return 'error'; }
            }
            return 'ok';
        }

        // Grey out the word-bank chips of correctly-completed parts (story words and segmented
        // parts alike) - a part entered wrongly is not greyed. With duplicate parts we grey the
        // first matching (by content) chip that is not yet grey ("first one in the list"). Grey
        // state is derived from what has been typed, so nothing is persisted - the shuffled order
        // lives in the DOM.
        function update_completed_chips() {
            const prog = parts_progress();
            const parts = bee.processed_word.add_words;
            const $chips = $('.prompt .addwords .word');
            $chips.removeClass('done');
            for(let k=0; k<prog.completed; k++) {
                if(segment_status(prog.starts[k], parts[k].length) != 'ok') { continue; } // don't grey a wrongly-typed part
                const p = parts[k].toLowerCase();
                for(let i=0; i<$chips.length; i++) {
                    const $c = $chips.eq(i);
                    if(!$c.hasClass('done') && $c.text().toLowerCase() == p) { $c.addClass('done'); break; }
                }
            }
        }


        // ---- Segmented (phoneme / morpheme) question type ----

        // Placeholder: a finished segment could be voiced here. phoneme is its ascii id (a key of
        // phoneme_sounds; 'x' means silent).
        const phoneme_sound_objs = {};
        function speak_completed_part(part, phoneme) {
            if(phoneme_sound_objs[phoneme] === undefined) {
                phoneme_sound_objs[phoneme] = {
                    file: 'assets/sounds/phonemes/ph_' + phoneme.replaceAll(/[^a-zA-Z0-9]/g, '_') + '.mp3',
                    volume: .7,
                    object: false
                };
            }
            _play_obj(phoneme_sound_objs[phoneme]);
            console.log('segmented part completed (TTS placeholder):', part, 'phoneme:', phoneme);
            // if(phoneme && phoneme != 'x') { play the clip for `phoneme` here }
        }


        // Render the input field for a segmented word: non-typed text (from to_display / mask)
        // plus one fixed-width box per part (add_words), filling as the child types. Wrong
        // characters are underlined; on a reveal repeat the answer is shown in grey.
        function render_segmented_input() {
            const s = bee.processed_word.to_display;
            const mask = bee.processed_word.mask;
            const to_type = bee.processed_word.to_type;
            const parts = bee.processed_word.add_words;

            // Decide how wide (in characters) to render each segment's box.
            // Normally every box is sized to the longest part, so the boxes are uniform and give no
            // clue about how long each part is. But horizontal space is limited, so for a long
            // series of boxes we switch to a compact mode that sizes boxes closer to their real
            // length rather than overflowing the row.
            let max_part_len = 0;
            let total_chars = 0;   // characters to render across all boxes
            let has_two_char = false; // is any segment exactly 2 characters?
            for(let i=0; i<parts.length; i++) {
                const len = parts[i].length;
                if(len > max_part_len) { max_part_len = len; }
                total_chars += len;
                if(len == 2) { has_two_char = true; }
            }
            // Proxy for the on-screen length of the box series: the characters in the boxes plus the
            // gaps between adjacent boxes (one per segment boundary, i.e. segments - 1).
            const box_series_len = total_chars + (parts.length - 1);
            // box_char_len(len) -> character widths to render a box holding a `len`-character segment
            let box_char_len;
            if(box_series_len < bee.max_box_len) {
                // Enough room: uniform boxes sized to the longest part (no length clue)
                box_char_len = function(len) { return max_part_len; };
            } else {
                // Compact: size boxes to their real length. To avoid singling out 1-character
                // segments when 2-character ones are present, render 1-char boxes at 2 characters
                // (so they look the same as the 2-char boxes); otherwise render them at 1 character.
                // Segments of 2+ characters are rendered at exactly their own width.
                const one_char_len = has_two_char ? 2 : 1;
                box_char_len = function(len) { return len == 1 ? one_char_len : len; };
            }

            let o = '';
            let type_ix = 0;    // index into to_type / the current typed position
            let part_ix = 0;    // index into parts
            let part_start = 0; // to_type index where the current part begins
            for(let i=0; i<s.length; i++) {
                if(mask[i] == '*') { // non-typed text around the parts
                    o += esc_html(s[i]);
                    continue;
                }
                if(i == 0 || mask[i-1] == '*') { // just entered to-type area
                    o += '<span class="typebox_wrap">';
                }
                if(type_ix == part_start) { // open a box at each part start; colour it once the part is completed
                    const st = segment_status(part_start, parts[part_ix].length);
                    const boxstyle = ' style="min-width:'+(box_char_len(parts[part_ix].length)*1.2)+'ch"';
                    o += '<span class="typebox'+(st == 'ok' ? ' typebox_ok' : (st == 'error' ? ' typebox_err' : ''))+'"'+boxstyle+'>';
                }
                if(type_ix == bee.typed.length) { o += '<span class="cursor_outer"><span class="cursor"></span></span>'; }
                if(type_ix < bee.typed.length) { // already typed (no per-character underline - the box colour shows errors)
                    const userchar = bee.typed[type_ix];
                    o += (userchar == ' ' ? '&nbsp;' : esc_html(userchar));
                } else if(bee.problem.is_reveal) { // reveal repeat: show the answer in grey
                    o += '<span class="reveal_totype">'+esc_html(to_type[type_ix])+'</span>';
                }
                if(type_ix == part_start + parts[part_ix].length - 1) { // close the box at the end of the part
                    o += '</span>';
                    part_ix++;
                    part_start = type_ix + 1;
                }
                if(i == s.length - 1 || mask[i+1] == '*') {
                    o += '</span>'; // close .typebox_wrap
                }
                type_ix++;
            }
            return o;
        }


        // Draw the split-digraph link lines for a segmented word. A segment whose phoneme spec is
        // '/X' (silent + link, see get_processed_word) is a silent "e" that lengthens the vowel two
        // boxes to its left, with one consonant box between them. Once that vowel box is completed
        // correctly we draw a rounded "bottom half of a box" (.segbox_link) joining the vowel box to
        // the silent-e box, passing under the box between them. Boxes may be non-uniform width (see
        // render_segmented_input's compact mode) but are kept on one line, so the link is measured
        // centre-to-centre off the rendered DOM rects and works at any box widths. Called after each
        // re-render of the input; the lines are children of .inp and are dropped when its html is
        // next replaced.
        function draw_segment_connectors() {
            const connectors = bee.processed_word.connectors;
            if(!connectors || connectors.indexOf(true) < 0) { return; } // nothing to link
            const parts = bee.processed_word.add_words;
            const $boxes = bee.$input.find('.typebox');
            if($boxes.length != parts.length) { return; } // render/parts mismatch: skip rather than mis-draw
            const base = bee.$input.get(0).getBoundingClientRect();
            if(!base.width) { return; } // input not laid out (hidden) - nothing to measure
            const prog = parts_progress();
            for(let i=2; i<connectors.length; i++) {
                if(!connectors[i]) { continue; }
                const vowel_ix = i - 2; // the vowel box the silent "e" lengthens (one box between)
                if(segment_status(prog.starts[vowel_ix], parts[vowel_ix].length) != 'ok') { continue; } // wait until the vowel is right
                const a = $boxes.get(vowel_ix).getBoundingClientRect(); // vowel box
                const c = $boxes.get(i).getBoundingClientRect();        // silent-e box
                const a_mid = (a.left - base.left) + a.width / 2;       // horizontal centre of the vowel box
                const c_mid = (c.left - base.left) + c.width / 2;       // horizontal centre of the silent-e box
                bee.$input.append($('<span class="segbox_link"></span>').css({
                    left:  (a_mid - 1) + 'px',                 // -1 centres the 2px arm on the box mid-line
                    top:   (a.bottom - base.top - 1) + 'px',   // start just under the box bottoms
                    width: (c_mid - a_mid + 2) + 'px'          // centre-to-centre, +2 for the two arm widths
                }));
            }
        }



        // Render a typed input into HTML. prefix=what is typed, s=full string
        function render_to_html(for_help) {
            if(bee.processed_word.is_segmented && !for_help) { return render_segmented_input(); }
            const line_length = 15; // word wrap after this many characters (for non-stories)

            const s = bee.processed_word.to_display;

            // Determine line breaks
            // The aim is to leave the underscores in place, so we word wrap according to the target string
            // With a story, wrap_at stays empty and so there is no forced wrapping
            const wrap_at = {};
            if(!bee.processed_word.is_story) {
                let cur_line = 0;
                for(let i=0; i<s.length; i++) {
                    cur_line++;
                    if(cur_line >= line_length) {
                        wrap_at[i] = 'forced';
                        cur_line = 0;
                        continue;
                    }
                    if(s[i] == ' ') {
                        let is_full = true;
                        for(let j=1; j<=line_length-cur_line; j++) { // lookahead
                            // console.log("ij", i, j, cur_line);
                            if(i+j >= s.length || s[i+j] == ' ') { 
                                is_full = false; 
                                break; 
                            }
                        }
                        if(is_full) {
                            wrap_at[i] = 'at space';
                            cur_line = 0;
                        }
                    }
                }
            }
            // console.log(wrap_at);
            
            let o = '';
            let typed_ix = 0;
            for(let i=0; i<s.length; i++) {
                const totype = (bee.processed_word.mask === false || bee.processed_word.mask[i] == '_'); // whether the character is to be typed
                
                if(for_help) { // We are rendering the help string
                
                    if(totype) { // We are in the area that should be typed
                        o += '<span class="help_totype">';
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                        o += '</span>';
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' ? '&nbsp;' : esc_html(s[i]));
                    }
                    if(wrap_at[i]) { o += '<br>'; }
                    
                } else { // We are rendering the input field
                
                    if(totype) { // We are in the area that should be typed
                        if(typed_ix < bee.typed.length) { // The user typed this much
                            const userchar = bee.typed[typed_ix];
                            const wrongchar = (s[i].toLowerCase() != userchar.toLowerCase());
                            if(wrongchar) { o += '<span class="wrongchar">'; }

                            if(userchar == ' ') {
                                if((!bee.processed_word.is_story) || wrongchar) { o += '&nbsp;'; } else { o += ' '; }
                            } else {
                                o += esc_html(userchar);
                            }
                            if(wrongchar) { o += '</span>'; }
                            if(wrap_at[i]) { o += '<br>'; }
                        } else { // The user is still to type this
                            if(typed_ix == bee.typed.length) { 
                                o += '<span class="cursor_outer"><span class="cursor"></span></span>';
                            } 
                            if(bee.problem.is_reveal) {
                                o += '<span class="reveal_totype">';
                                o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                                o += '</span>';
                            } else if(bee.processed_word.is_story) {
                                o += '<span class="story_totype">'+esc_html(s[i])+'</span>';
                            } else {
                                o += (s[i] == ' ' ? '<span class="spacehelp">_</span>' : '_');
                            }
                            if(wrap_at[i]) { o += '<br>'; }
                        }
                        typed_ix++;
                    } else { // This does not need to be typed
                        o += (s[i] == ' ' && (!bee.processed_word.is_story) ? '&nbsp;' : esc_html(s[i]));
                        if(wrap_at[i]) { o += '<br>'; }
                    }
                
                }
            }
            return o;
        }

        function get_stats_of_known_words() {
            const level_counts = [];

            for(let i=0; i<bee.words.length; i++) {

                if(typeof(level_counts[wlevel]) == 'undefined') { level_counts[wlevel] = 0; }

        function process_typing(group, key_distances, is_direct) {
            if(group == 'TYPING') {
                if(!bee.can_type) { 
                    playme('notavail');
                    return; 
                }
                
                let typed_key = undefined;
                if(is_direct) {
                    typed_key = key_distances;
                } else {
                    // Check if the user could have meant the next correct character
                    if(bee.typed.length < bee.processed_word.to_type.length) {
                        const desired_char = bee.processed_word.to_type[bee.typed.length];
                        for(let i=0; i<key_distances.length; i++) {
                            if(key_distances[i][1] < .6 /* ratio to key width */ && key_distances[i][0].toLowerCase() == desired_char.toLowerCase()) {
                                typed_key = desired_char; break;
                            }
                        }
                    }
                    if(typed_key === undefined) { 
                        if(key_distances[0][1] > .5) { return; }
                        typed_key = key_distances[0][0];
                    }
                }
                
                if(typed_key == 'BACKSPACE') {
                    if(bee.typed.length > 0) {
                        bee.typed = bee.typed.substring(0, bee.typed.length-1);
                        update_input_field();
                        bee.backspace_used++;
                        highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    }
                    return;
                }

                if(typed_key == 'HELP') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(!bee.can_use_help) { playme('notavail'); return; }
                    show_help(false);
                    return;
                }
                if(typed_key == 'PLAY_WORD') {
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key+'"]');
                    if(bee.processed_word.is_story) { return; }
                    play_word();
                    return;
                }
                
                if(bee.typed.length < bee.processed_word.to_type.length) {
                    
                    // If we're in a story, check if we have just finished a word to type
                    let story_word_boundary = false;
                    let addwords_cumulative = '';
                    let addwords_last = -1;
                    if(bee.processed_word.is_story) {
                        for(let i=0; i<bee.processed_word.add_words.length - 1; i++) {
                            addwords_cumulative += bee.processed_word.add_words[i];
                            addwords_last = i;
                            if(addwords_cumulative.length > bee.typed.length) { break; }
                            if(addwords_cumulative.toLowerCase() == bee.typed.toLowerCase()) {
                                story_word_boundary = true;
                                addwords_cumulative += bee.processed_word.add_words[i+1]; // store the next goal to check after adding the typed character
                                addwords_last = i+1;
                                break;
                            }
                        }
                    }
                
                    // Segmented: how many parts were complete before this keystroke
                    const seg_completed_before = bee.processed_word.is_segmented ? parts_progress().completed : 0;

                    if(story_word_boundary && typed_key == ' ') {
                        console.log("Skipping space at story word boundary");
                    } else {
                        bee.typed += typed_key;
                        if(bee.processed_word.is_story && bee.typed.toLowerCase() == addwords_cumulative.toLowerCase()) {
                            console.log("Story word completed");
                            if(bee.typed.length < bee.processed_word.to_type.length) {
                                const word_to_play = bee.processed_word.add_words[addwords_last];
                                console.log("Speaking story word", word_to_play);
                                play_word(word_to_play, undefined, undefined, true); /* text, callback, max_timeout, force */
                            }
                        }
                        if(bee.processed_word.is_segmented) {
                            // This keystroke fills at most one part; if it just filled one, voice its
                            // phoneme - but only if that part was typed correctly (don't voice a wrong
                            // entry). The final part is voiced too; the success handler below waits for
                            // it before proceeding.
                            const seg_prog = parts_progress();
                            const seg_completed = seg_prog.completed;
                            const done_ix = seg_completed - 1;
                            if(seg_completed > seg_completed_before && segment_status(seg_prog.starts[done_ix], bee.processed_word.add_words[done_ix].length) == 'ok') {
                                speak_completed_part(bee.processed_word.add_words[done_ix], bee.processed_word.phonemes[done_ix]);
                            }
                        }
                    }
                    update_input_field();
                    highlight_key('.kbdiv .kbkey[data-key="'+typed_key.toLowerCase()+'"]');
                    
                    if(bee.typed.toLowerCase() == bee.processed_word.to_type.toLowerCase()) { // Success!
                        disable_typing();
                        bee.$input.addClass('success');
                        
                        let outcome = 'UNSURE';
                        if(bee.problem.is_repeat) {
                            outcome = 'OK';
                        } else if(bee.help_asked > 0) {
                            outcome = 'ASK_ALL';
                        } else {
                            if(bee.processed_word.is_story) {
                                if(bee.backspace_used <= 2) {
                                    outcome = 'ADD_KNOWN';
                                } else if(bee.backspace_used <= 3) {
                                    outcome = 'OK';
                                } else if(bee.backspace_used <= 5) {
                                    outcome = 'ASK_ONCE';
                                } else {
                                    outcome = 'ASK_ALL';
                                }
                            } else { // Not story
                                if(bee.backspace_used <= 1) {
                                    outcome = 'ADD_KNOWN';
                                } else if(bee.backspace_used <= 2) {
                                    outcome = 'OK';
                                } else if(bee.backspace_used <= 3) {
                                    outcome = 'ASK_ONCE';
                                } else {
                                    outcome = 'ASK_ALL';
                                }
                            }
                        }
                        console.log('success help=', bee.help_asked, 'backspace=', bee.backspace_used, 'outcome=', outcome, 'level=', bee.processed_word.level, 'NOTlongstory=', bee.processed_word.level < MIN_LONGSTORY_LEVEL);
                        
                        if(outcome == 'ADD_KNOWN') {
                            queue_success();
                            add_known_word();
                        } else if(outcome == 'ASK_ONCE' && bee.processed_word.level < MIN_LONGSTORY_LEVEL) {
                            reschedule_question(bee.problem, false);
                        } else if(outcome == 'ASK_ALL' && bee.processed_word.level < MIN_LONGSTORY_LEVEL) {
                            reschedule_question(bee.problem, true);
                        } else { // 'OK'
                            queue_success();
                        }
                        
                        /* 
                        call_local_hook('success_hook', [bee.problem.word_ix, bee.words[bee.problem.word_ix].text, bee.player, bee.help_asked, -1]);
                        */

                        const on_success = function() {
                            success_common({'skip_this_score':bee.problem.is_repeat});
                        };

                        // Story / segmented: re-read the whole text before advancing (req 6)
                        const re_read = (bee.processed_word.is_story || bee.processed_word.is_segmented) && !bee.problem.is_reveal;
                        if(bee.processed_word.is_segmented) {
                            // The final part's phoneme was just voiced; pause ~1s to let it finish
                            // before the success actions (re-read the whole word, then success_common)
                            setTimeout(function() {
                                if(re_read) { play_word(undefined, on_success, undefined, true); } else { on_success(); }
                            }, 1000);
                        } else if(re_read) { play_word(undefined, on_success, undefined, true); } else { on_success(); }
                    }
                }
                return;
            }
        }

        // Returns whether to use this item (true) or choose another one (false)
        // based on the user's success history
        function known_score_to_choice20(score) {
            let limit = 0;
            if(score < 2) { return true; }
            if(score == 2) { limit = .8; }
            else if(score == 3) { limit = .9; }
            else if(score == 4) { limit = .95; }
            else { limit = .99; }
            return (Math.random() > limit);
        }

        // withheld this session.
        function exclude_story_questions() {

        function try_get_new_word10(word_class) {
            let trials = 50;

            let word_ix = undefined;
            let log = 'needclass:'+word_class;
            const queue = get_question_queue();
            const exclude_stories = exclude_story_questions(); // withhold multi-substring "story" items this session?
            
            
            while(trials > 0) {
                log += ' trials:'+trials;
                trials--;
                
                if(word_class !== undefined) { // We have a desired word class (subsequent words)
                    const ixs = bee.class_to_ix[word_class];
                    if(ixs === undefined) { log += ' class_not_found'; break; }
                    if(ixs.length == 0) { log += ' class_empty'; break; }
                    // Choose using levels
                    word_ix = choose_using_levels20(ixs);
                    log += ' wix:'+word_ix+" lev:"+bee.words[word_ix].level;
                    // ensure we choose a new word (check the queue)
                    if(trials > 0) {
                        let dupl = false;
                        for(let i=0; i<queue.length; i++) {
                            if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                        }
                        if(dupl) { log += ' norep'; continue; }
                    }
                    // Avoid story-type (multi-substring) questions when this session excludes them;
                    // relax on the final trial (trials==0) so we never spin forever if none are left
                    if(trials > 0 && exclude_stories && get_processed_word(word_ix).is_story) { log += ' nostory'; continue; }
                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice20(known_count)) { log += ' no'; continue; }
                    break;
                }

                if(word_class === undefined) { // first word
                    const longstory_ids = Object.keys(bee.longstory_beginnings);
                    if(longstory_ids.length) { // see MIN_LONGSTORY_LEVEL
                        // Long story mode
                        const longstory_id = longstory_ids[Math.floor(Math.random() * longstory_ids.length)];
                        word_ix = bee.longstory_beginnings[longstory_id];
                    }
                    else {
                        // Normal mode:            
                        // Choose using levels
                        word_ix = choose_using_levels20(undefined); // undefined: from all words
                        log += " wix:"+word_ix+" lev:"+bee.words[word_ix].level;
                        // ensure we choose a new word (check the queue)
                        if(bee.words.length > 1 && trials > 0) {
                            let dupl = false;
                            for(let i=0; i<queue.length; i++) {
                                if(queue[i] !== undefined && queue[i] !== null && queue[i].word_ix == word_ix) { dupl = true; break; }
                            }
                            if(dupl) { log += ' norep'; continue; }
                        }
                    }
                    // Avoid story-type (multi-substring) questions when this session excludes them;
                    // relax on the final trial (trials==0) so we never spin forever if none are left
                    if(trials > 0 && exclude_stories && get_processed_word(word_ix).is_story) { log += ' nostory'; continue; }
                    // Avoid already known words (typed without help)
                    const known_count = is_known_word(word_ix);
                    log += " known:"+known_count;
                    if(!known_score_to_choice20(known_count)) { log += ' no'; continue; }
                    break;
                }

            }
            console.log('try_get_new_word: '+log);
            if(trials == 0) { return undefined; }
            return word_ix;
        }
        
        
        function new_question(reason) {  // also called from common.js on successfully answering a question
            console.log('#new_question05() caller=', reason);
            if(check_dismiss_puzzle()) { return; } // puzzle solved: don't generate/speak the next question
            // No words match the selected level range: warn instead of crashing while picking a word
            if(bee.words.length == 0) {
                bee_alert('No words found for the selected level range. Please choose a different range with "Update word sets".');
                return;
            }
            page_update();
            
            try{ document.activeElement.blur(); }catch(e){}
            
            let problem = get_first_on_queue();
            let log = '';            
            if(problem !== undefined) {
                log += ' from queue';
                if(problem.word_ix >= bee.words.length) { log += ' invalid'; problem = undefined; }
            }
            if(problem === undefined) { // Get a new word/problem
            
                let word_ix = undefined;
                let warned_no_word = false; // bee_alert() is non-blocking, so only warn once (no modal stacking)
                while(true) {
                    word_ix = try_get_new_word10(undefined); // first word in class group
                    if(word_ix === undefined) {
                        if(!warned_no_word) { bee_alert('No first word found, trying again'); warned_no_word = true; }
                        continue;
                    }
                    break;
                }
                
                // Longstory mode
                if(bee.words[word_ix].level >= MIN_LONGSTORY_LEVEL) {
                
                    log += ' first_word:'+word_ix;
                    problem = {'word_ix':word_ix, 'is_repeat':false, 'word_class':undefined};
                    store_question11(problem);
                    const story_id = bee.words[word_ix].level;
                    log += ' story_id:'+story_id;
                    // Queue the rest of the story (consecutive runs of the same level)
                    while(true) {
                        word_ix++;
                        if(word_ix >= bee.words.length || bee.words[word_ix].level != story_id) { break; }
                        store_question11({'word_ix':word_ix, 'is_repeat':false, 'word_class':undefined});
                    }
                
                }
                else {
                    // Normal mode: choose more words from one of the same word group(s)
                
                    // Word class group
                    let word_class = bee.words[word_ix].class;
                    if(word_class === undefined || word_class.length == 0) { word_class = ['noclass:']; }
                    word_class = word_class[Math.floor(Math.random() * word_class.length)]; // choose random class
                    log += ' group_class:'+word_class;

                    log += ' first_word:'+word_ix;
                    problem = {'word_ix':word_ix, 'is_repeat':false, 'word_class':word_class};
                    store_question11(problem);

                    const word_ixs = bee.class_to_ix[word_class];
                    if(word_ixs !== undefined && word_ixs.length > 0) {
                        const desired_number_of_words = Math.min(6, word_ixs.length); // Aim for groups of 7
                        log += ' desired:'+desired_number_of_words;
                        for(let j=0; j<desired_number_of_words; j++) {
                            const group_word = try_get_new_word10(word_class);
                            log += ' group_word:'+group_word;
                            if(group_word !== undefined) {
                                store_question11({'word_ix':group_word, 'is_repeat':false, 'word_class':word_class});
                            }
                        }
                    }
                    
                } // end if mode
                
            }
            console.log("Selecting new word:", log);
            start_question14(problem); // the first word
        }

        
        // Parse word data into a data structure
        // <level>|<image_ref>@<emoji>|<text>|<class>,<class>,...
        // <level>|<image_ref>|<text>|<class>,<class>,...
        // <level>|@<emoji>|<text>|<class>,<class>,...
        //
        // <image_ref> is by default local, but is nonlocal if it starts with ~
        //
        // Output: {'level':, 'text':, 'class'} and the keys 'imgref' or 'ref', and/or 'emoji'
        function process_word_data(datastr) {
            const data = datastr.split('|');
            if(data.length != 4) { console.error("Malformed word entry", datastr, data); }
            const img = data[1].split('@');
            const out = {
                'level': data[0],
                'text': data[2],
                'class': (data[3] === undefined || data[3].length == 0 ? [] : data[3].split(','))
            };
            if(img[0].length) {
                if(img[0].startsWith('~')) {
                   out.imgref = img[0].slice(1);
                } else {
                    out.ref = img[0];
                }
            }
            if(img[1] !== undefined && img[1].length) { out.emoji = img[1]; }
            return out;
        }

        
        function init_wordlist_impl(min_level, max_level) {
            const out = {};
            
            out.words = []; // word index -> word data
            out.level_counts = []; // level (<MIN_LONGSTORY_LEVEL) -> count
            out.longstory_beginnings = {}; // level (>=MIN_LONGSTORY_LEVEL) -> word_ix
            for(let i=0; i<word_repository.length; i++) {
                const wrdata = process_word_data(word_repository[i]);
                const wlevel = wrdata.level;
                if(wlevel >= min_level && wlevel <= max_level) {
                    out.words.push(wrdata);
                    
                    if(wlevel < MIN_LONGSTORY_LEVEL) {
                        if(typeof(out.level_counts[wlevel]) == 'undefined') { out.level_counts[wlevel] = 0; }
                        out.level_counts[wlevel]++;
                    } else  {
                        if(out.longstory_beginnings[wlevel] === undefined) {
                            out.longstory_beginnings[wlevel] = out.words.length - 1;
                        }
                    }
                }
            }
            console.log("NUMBER OF WORDS PER LEVEL", out.level_counts);

            // Classes
            out.class_to_ix = {};
            for(let i=0; i<out.words.length; i++) {
                let cl = out.words[i].class;
                if(cl === undefined || cl.length == 0) { cl = ['noclass:']; }
                for(let j=0; j<cl.length; j++) {
                    const thisclass = cl[j];
                    let cllist = out.class_to_ix[thisclass];
                    if(cllist === undefined) {
                        out.class_to_ix[thisclass] = []; cllist = out.class_to_ix[thisclass];
                        // Flag an unrecognised tag once (typo?): not present in known_class_tags at all
                        if(known_class_tags[thisclass] === undefined) {
                            console.error('Unknown class tag', JSON.stringify(thisclass), 'e.g. in', JSON.stringify(out.words[i].text));
                        }
                    }
                    cllist.push(i);
                }
            }
            
            return out;
        }
        

        // Choose an item using the levels from the list of word indices or all words if undefined
        function choose_using_levels20(list_of_wordix) {
            const word_weights_cumulative = [];
            let word_weight_sum = 0;

            // Get list of cumulative weights
            const loop_limit = (list_of_wordix === undefined ? bee.words.length : list_of_wordix.length);
            for(let i=0; i<loop_limit; i++) {
                const word_ix = (list_of_wordix === undefined ? i : list_of_wordix[i]);
                const w = Math.pow(1.5, -bee.words[word_ix].level);
                word_weight_sum += w;
                word_weights_cumulative.push(word_weight_sum);
            }
            
            const weight_point = Math.random() * word_weight_sum;
            let ix_chosen = undefined;
            for(let i=0; i<loop_limit; i++) {
                if(weight_point < word_weights_cumulative[i]) { ix_chosen = i; break; }
            }
            if(ix_chosen === undefined) { ix_chosen = loop_limit - 1; }
            
            const word_ix_chosen = (list_of_wordix === undefined ? ix_chosen : list_of_wordix[ix_chosen]);
            if(word_ix_chosen === undefined) { console.error("choose_using_levels20", list_of_wordix, weight_point, ix_chosen); }
            return word_ix_chosen;
        }
        
        
        function init_wordlist() {
            let min_wordset = bee.storage.players[bee.player].min_wordset; // min level
            if(min_wordset === undefined) { min_wordset = 0; }
            const max_wordset = bee.storage.players[bee.player].wordsets; // max level
            
            const r = init_wordlist_impl(min_wordset, max_wordset);
            bee.words = r.words;
            bee.class_to_ix = r.class_to_ix;
            bee.level_counts = r.level_counts;
            bee.longstory_beginnings = r.longstory_beginnings;
            
            $('.d_wordsets').html(
                esc_html(min_wordset) + " to " + esc_html(max_wordset)
            );
        }
        
        
        function get_question_queue() {
            delete bee.storage.players[bee.player].current_question;
            if(bee.storage.players[bee.player].scheduled_questions === undefined) {
                bee.storage.players[bee.player].scheduled_questions = [];
            }
            return bee.storage.players[bee.player].scheduled_questions;
        }

        
        function purge_question_queue() {
            bee.storage.players[bee.player].scheduled_questions = [];
        }

        
        // Store problem on queue, filling up undefineds first
        // Queue is also used to prevent getting a new problem when the page is refreshed
        function store_question11(problem) {
            const s = get_question_queue();
            let added = false;
            for(let i=0; i<s.length; i++) {
                if(s[i] === undefined || s[i] === null) {
                    s[i] = problem;
                    added = true;
                    break;
                }
            }
            if(!added) { s.push(problem); }
            save_storage('store_question');
        }
        
        // Called if the question is answered successfully
        function queue_success() {
            get_question_queue().shift();
            save_storage('queue_success');
        }
        
        // Schedule question to be shown N questions later
        function reschedule_question(problem, add_reveal) {
            console.log('reschedule_question', problem, add_reveal);
            const s = get_question_queue();
            s.shift(); // remove this question
            while(s.length < 3) { s.push(undefined); }
            s.splice(3, 0, {'word_ix':problem.word_ix, 'word_class':problem.word_class, 'is_repeat':true, 'is_reveal':false});
            if(add_reveal) {
                s.splice(1, 0, {'word_ix':problem.word_ix, 'word_class':problem.word_class, 'is_repeat':true, 'is_reveal':true});
            }
            save_storage('schedule_question');
        }
        
        // Return the first question on the queue without taking it off
        function get_first_on_queue() {
            const s = get_question_queue();
            if(s.length == 0) { return undefined; }
            const w = s[0];
            if(w === undefined) { return undefined; }
            if(typeof(w) == 'object') {
                if(w === null) { return undefined; } // JSON storing turns undefined into null
                return w; 
            }
            return undefined;
        }


        // Choose a range of word sets to show words from; result is delivered to callback([min, max])
        function choose_wordsets(callback) {
            bee_prompt("What range of levels sets should we use?\nType a number for the bottom end of the range", function(min_value) {
                let min_wordset = min_value - 0;
                if(isNaN(min_wordset)) { min_wordset = 0; }
                bee_prompt("Type a number from "+min_wordset+" for the top end of the range", function(max_value) {
                    let max_wordset = max_value - 0;
                    if(isNaN(max_wordset)) { max_wordset = 0; }
                    callback([min_wordset, max_wordset]);
                });
            });
        }

        
        function modify_wordlist() {
            if(bee.player === false) { bee_alert("Choose a player first"); return; }
            choose_wordsets(function(wordsets) {
                bee.storage.players[bee.player].min_wordset = wordsets[0];
                bee.storage.players[bee.player].wordsets = wordsets[1];
                call_local_hook('problemset_hook', [String(wordsets)]);
                purge_question_queue();
                save_storage('modify_wordlist');
                init_wordlist();
                new_question('modify_wordlist');
            });
        }
        
        
        function main() {
            data_migration();
            document.addEventListener('keydown', process_keypress); // Or use 'keypress' event

            update_score_ui(false);
            $('.d_player').html(esc_html(bee.player));
            init_wordlist();

            bee_aquarium.init_game();
            bee_aquarium.init_food();
            // Switch to aquarium tab automatically after a fish/item gift animation
            bee_aquarium.on_aquarium_gift = function() { switch_to_tab('aquarium'); };

            switch_to_tab('game');
            new_question('main');
        }
        
        // Asynchronous: choose_wordsets() prompts the user. callback() (optional) fires once done.
        function init_player_data(callback) {
            choose_wordsets(function(wordsets) {
                bee.storage.players[bee.player] = {
                    'data_version': bee_current_data_version,
                    'score': 0,
                    'min_wordset': wordsets[0],
                    'wordsets': wordsets[1]
                };
                if(callback) { callback(); }
            });
        }

    </script>
